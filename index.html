<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* Host Hotel Systems palette */
    --bg:#0c1018; --panel:#121826; --panel2:#1a2334; --line:#283246;
    --txt:#e9edf4; --muted:#93a0b5; --accent:#1f6bff; --accent2:#0f57e6;
    --ok:#36c08a; --warn:#e0a93f; --danger:#e0556b; --chip:#173766;
    --navy:#15202e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .app{display:flex;flex-direction:column;height:100vh}

  /* Top bar */
  .topbar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex:0 0 auto}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer}
  .brand:hover .bname{opacity:.85}
  .brand .bname{font-weight:800;font-size:16px;letter-spacing:.2px;line-height:1}
  .brand .bname i{color:var(--accent);font-style:normal}
  .brand .byhost{font-size:9px;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:3px}
  .brand .stack{display:flex;flex-direction:column}
  .tname{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 10px;border-radius:8px;min-width:220px}
  .spacer{flex:1}
  .langtoggle{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .langtoggle button{background:transparent;border:0;color:var(--muted);padding:6px 14px;font-weight:600}
  .langtoggle button.active{background:var(--accent);color:#fff}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:7px 12px;border-radius:8px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;line-height:1}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent2)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:4px 8px;font-size:12px;border-radius:6px}
  .savestate{font-size:12px;color:var(--muted)}

  /* Main 3-column */
  .main{display:flex;flex:1;min-height:0}
  .col{display:flex;flex-direction:column;min-height:0}
  .left{width:240px;flex:0 0 240px;background:var(--panel);border-right:1px solid var(--line)}
  .center{flex:1;background:#0b0d11;overflow:auto}
  .right{width:300px;flex:0 0 300px;background:var(--panel);border-left:1px solid var(--line)}
  .scroll{overflow:auto;padding:12px}
  .sectitle{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:6px 4px 8px}

  /* Left: templates + add blocks */
  .tpl-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--muted)}
  .tpl-item:hover{background:var(--panel2)}
  .tpl-item.active{background:var(--chip);color:#fff}
  .tpl-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tpl-item .ico{font-size:13px;flex:0 0 auto}
  .tpl-item .badge{flex:0 0 auto;font-size:10px;font-weight:700;background:var(--panel2);color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:1px 7px}
  .tpl-item.active .badge{background:rgba(255,255,255,.15);color:#fff;border-color:transparent}
  .prj-item{font-weight:600}
  .muted-count{font-size:10px;color:var(--muted);font-weight:600}
  .addgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
  .addgrid button{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 4px;font-size:11px}
  .addgrid button:hover{border-color:var(--accent);color:#fff}
  .addgrid .ico{font-size:16px}

  /* Center: canvas (email preview/edit) */
  .canvas-wrap{display:flex;flex-direction:column;align-items:center;padding:24px}
  .subjectbar{width:600px;max-width:100%;margin-bottom:10px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .subjectbar label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
  .subjectbar input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:8px}
  .email{width:600px;max-width:100%;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  .blocks{min-height:120px}
  .blk{position:relative;border:2px solid transparent}
  .blk.sel{border-color:var(--accent)}
  .blk:hover .blk-tools{opacity:1}
  .blk-tools{position:absolute;top:4px;right:4px;display:flex;gap:3px;opacity:0;transition:.15s;z-index:3}
  .blk-tools button{background:rgba(20,24,32,.92);border:1px solid var(--line);color:#fff;border-radius:6px;width:24px;height:24px;font-size:12px;display:flex;align-items:center;justify-content:center}
  .blk-tools button:hover{background:var(--accent)}
  .empty-hint{padding:50px 20px;text-align:center;color:#9aa3b2;font-size:13px}

  /* Right: properties + tags */
  .tabs{display:flex;border-bottom:1px solid var(--line)}
  .tabs button{flex:1;background:transparent;border:0;color:var(--muted);padding:10px;font-weight:600;border-bottom:2px solid transparent}
  .tabs button.active{color:#fff;border-bottom-color:var(--accent)}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .field input[type=text],.field input[type=number],.field textarea,.field select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:7px 9px;border-radius:7px}
  .field textarea{min-height:90px;resize:vertical;line-height:1.5}
  .row2{display:flex;gap:8px}
  .row2>.field{flex:1}
  .colorrow{display:flex;align-items:center;gap:8px}
  .colorrow input[type=color]{width:36px;height:30px;padding:0;border:1px solid var(--line);border-radius:6px;background:none}
  .seg{display:flex;gap:0;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{flex:1;background:var(--panel2);border:0;color:var(--muted);padding:6px}
  .seg button.active{background:var(--accent);color:#fff}

  .tagsearch{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:8px;margin-bottom:8px}
  .tagcat{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin:10px 2px 4px;font-weight:700}
  .tag{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent}
  .tag:hover{background:var(--panel2);border-color:var(--line)}
  .tag .tlab{flex:1;font-size:12.5px}
  .tag .tcode{font-size:10px;color:var(--muted);font-family:Consolas,monospace}
  .tag .ins{font-size:11px;color:var(--accent);opacity:0}
  .tag:hover .ins{opacity:1}
  .tag-hint{font-size:11px;color:var(--muted);background:var(--panel2);border:1px dashed var(--line);border-radius:8px;padding:8px;margin-bottom:8px;line-height:1.5}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:760px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column}
  .modal h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-size:15px}
  .modal .body{padding:16px 18px;overflow:auto}
  .modal .foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
  pre.code{background:#0b0d11;border:1px solid var(--line);border-radius:10px;padding:14px;overflow:auto;font-family:Consolas,monospace;font-size:12.5px;line-height:1.55;color:#cdd6e6;white-space:pre-wrap;word-break:break-word;max-height:52vh}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#04231a;padding:10px 18px;border-radius:10px;font-weight:700;opacity:0;transition:.25s;z-index:80}
  .toast.show{opacity:1}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}
  .switchmode{display:flex;gap:6px;margin-bottom:12px}

  /* ===================== UI/UX polish ===================== */
  *{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{background:radial-gradient(1200px 600px at 75% -10%, #1a2030 0%, var(--bg) 55%)}
  ::selection{background:rgba(91,140,255,.35)}
  /* scrollbars */
  *{scrollbar-width:thin;scrollbar-color:#3a414f transparent}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#333a47;border-radius:10px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#454e5f;background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}
  /* transitions */
  .btn,.tpl-item,.tab,.tabs button,.addgrid button,.tag,.seg button,.gcard,.langtoggle button{transition:background .15s,border-color .15s,color .15s,transform .12s,box-shadow .15s}
  .btn:active{transform:translateY(1px)}
  .btn.primary{box-shadow:0 2px 12px rgba(91,140,255,.28)}
  .btn.primary:hover{box-shadow:0 4px 18px rgba(91,140,255,.42)}
  /* top bar */
  .topbar{box-shadow:0 1px 0 rgba(255,255,255,.03),0 6px 18px rgba(0,0,0,.25);backdrop-filter:blur(6px)}
  .brand{font-size:17px}
  .tname{transition:border-color .15s,box-shadow .15s}
  .tname:focus,input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.18)}
  /* template list */
  .tpl-item{position:relative;margin-bottom:2px}
  .tpl-item.active{box-shadow:inset 2px 0 0 var(--accent)}
  .tpl-item:hover{transform:translateX(2px)}
  /* add block grid */
  .addgrid button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.25)}
  /* tabs underline animation */
  .tabs button{position:relative}
  .tabs button::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;background:var(--accent);border-radius:2px;transform:scaleX(0);transition:transform .18s}
  .tabs button.active::after{transform:scaleX(1)}
  .tabs button.active{border-bottom-color:transparent}
  /* tags */
  .tag:hover{transform:translateX(2px)}
  /* email preview card framing */
  .email{transition:box-shadow .2s}
  #htmlPrev{box-shadow:0 8px 30px rgba(0,0,0,.18)}
  /* modal animation */
  .modal{animation:pop .22s cubic-bezier(.2,.8,.2,1)}
  .modal-bg{backdrop-filter:blur(3px)}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  /* gallery cards */
  .gcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.35)}
  /* toast */
  .toast{box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .toast.show{animation:toastIn .3s cubic-bezier(.2,.8,.2,1)}
  @keyframes toastIn{from{transform:translateX(-50%) translateY(8px)}to{transform:translateX(-50%) translateY(0)}}
  /* inputs in right panel inherit nicer focus already; placeholder color */
  ::placeholder{color:#6b7384}
  /* lang toggle pill */
  .langtoggle{box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
  /* quick tag chips */
  .qtag{background:var(--chip);border:1px solid #2f5394;color:#cfe0ff;font-family:Consolas,monospace;font-size:11px;padding:4px 8px;border-radius:20px;cursor:pointer;transition:background .14s,transform .12s,box-shadow .14s}
  .qtag:hover{background:#2f5aa0;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.3)}
  .qtag:active{transform:translateY(0)}
  /* cloud login overlay + badge */
  .login-ov{position:fixed;inset:0;z-index:120;display:flex;align-items:safe center;justify-content:center;overflow-y:auto;padding:20px;background:radial-gradient(1200px 600px at 75% -10%, #1a2030 0%, var(--bg) 55%)}
  .login-card{width:380px;max-width:100%;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 24px;box-shadow:0 20px 60px rgba(0,0,0,.45);animation:pop .25s cubic-bezier(.2,.8,.2,1)}
  .nf-grid{display:grid;grid-template-columns:1fr 1fr;column-gap:28px;align-items:start}
  @media (max-width:820px){ .nf-grid{grid-template-columns:1fr} }
  .spin{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .achips{display:flex;flex-wrap:wrap;gap:6px}
  .achip{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--txt)}
  .adot{width:11px;height:11px;border-radius:50%;display:inline-block;border:1px solid rgba(255,255,255,.25)}
  .login-brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .cloud-badge{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 10px}
  .cloud-badge .cb-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(54,192,138,.18)}
  .cloud-badge .cb-mail{max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
  .cloud-badge a{color:var(--accent);text-decoration:none;font-weight:600}
  /* collapsible accordion (Propriedades) */
  .acc{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--panel);overflow:hidden}
  .acc-h{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;font-size:12px;font-weight:700;color:var(--txt);user-select:none;transition:background .14s}
  .acc-h:hover{background:var(--panel2)}
  .acc-x{transition:transform .15s;color:var(--muted);font-size:11px}
  .acc:not(.open) .acc-x{transform:rotate(-90deg)}
  .acc-b{display:none;padding:2px 12px 12px}
  .acc.open .acc-b{display:block}
  /* body items + drag & drop */
  .bitem{border:1px solid var(--line);border-radius:10px;padding:9px;margin-bottom:8px;background:var(--panel2);transition:box-shadow .1s,opacity .1s}
  .bitem-h{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .bitem-type{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent)}
  .drag-h{cursor:grab;color:var(--muted);font-size:15px;line-height:1;padding:0 3px}
  .drag-h:hover{color:var(--accent)}
  .drag-h:active{cursor:grabbing}
  .bitem.dragging{opacity:.45}
  .bitem.drop-before{box-shadow:0 -3px 0 var(--accent)}
  .bitem.drop-after{box-shadow:0 3px 0 var(--accent)}
  /* construtor do corpo (drag & drop, zona central) */
  .bld-top{margin-bottom:11px}
  .bld-ttl{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:800;color:var(--txt);letter-spacing:.2px}
  .bld-sub{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.55}
  .bpal{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;padding:11px;border:1px dashed var(--line);border-radius:12px;background:var(--panel)}
  .bpiece{display:inline-flex;align-items:center;gap:7px;cursor:grab;user-select:none;padding:9px 14px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--txt);font-size:12.5px;font-weight:700;transition:transform .1s,border-color .12s,box-shadow .12s}
  .bpiece:hover{border-color:var(--accent);box-shadow:0 5px 16px rgba(0,0,0,.22);transform:translateY(-1px)}
  .bpiece:active{cursor:grabbing}
  .bld-list{display:flex;flex-direction:column}
  .bdz{height:9px;border-radius:7px;margin:1px 0;transition:height .12s,border-color .12s,background .12s}
  .bdz.over{height:38px;border:2px dashed var(--accent);background:var(--panel2)}
  .bcard{border:1px solid var(--line);border-radius:11px;background:var(--panel);padding:10px 11px;transition:opacity .1s,box-shadow .12s}
  .bcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.16)}
  .bcard.dragging{opacity:.4}
  .bcard-h{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .bcard-t{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent)}
  .bdrag{cursor:grab;color:var(--muted);font-size:15px;line-height:1;padding:0 2px}
  .bdrag:hover{color:var(--accent)}
  .bdrag:active{cursor:grabbing}
  .bx{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 7px;border-radius:6px;line-height:1}
  .bx:hover{background:#ff5a5a22;color:#ff6b6b}
  .bld-empty{padding:24px;text-align:center;color:var(--muted);font-size:12.5px;border:1px dashed var(--line);border-radius:11px}
  /* design picker com miniaturas */
  .dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  #tabStyle .dgrid{grid-template-columns:1fr 1fr}
  .dcard{cursor:pointer;border:2px solid var(--line);border-radius:10px;padding:6px;background:var(--panel2);transition:border-color .14s,transform .12s}
  .dcard:hover{transform:translateY(-1px)}
  .dcard.sel{border-color:var(--accent)}
  .dthumb{border-radius:6px;overflow:hidden}
  .dname{font-size:11.5px;font-weight:700;color:var(--txt);text-align:center;margin-top:5px}
  .dcard.sel .dname{color:var(--accent)}
  /* font picker visual */
  .fontgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .fcard{cursor:pointer;border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:var(--panel2);display:flex;align-items:baseline;gap:8px;transition:border-color .14s}
  .fcard:hover{border-color:var(--accent)}
  .fcard.sel{border-color:var(--accent);background:var(--chip)}
  .fcard .fa{font-size:18px;color:var(--txt);line-height:1}
  .fcard .fn{font-size:12px;color:var(--muted)}
  .fcard.sel .fa,.fcard.sel .fn{color:#fff}
  /* slider de intensidade */
  .shade-row{display:flex;align-items:center;gap:9px;margin-top:2px}
  .shade-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);flex:0 0 auto}
  .shade-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:linear-gradient(to right,#9db8ff,var(--accent),#0b2e7a);outline:none}
  .shade-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .shade-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer}
  /* lista de templates do form (1 por linha) */
  .evlist{display:flex;flex-direction:column;gap:6px}
  .evrow{display:flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13px;cursor:pointer}
  .evrow input{flex:0 0 auto}
  .evrow .tn{flex:1}
  .evrow .tc{font-family:Consolas,monospace;font-size:10px;color:var(--muted)}
  .wsub{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:12px 0 7px}
  /* galeria de modelos */
  .gchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .gchip{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.13s}
  .gchip:hover{border-color:var(--accent);color:var(--txt)}
  .gchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .gevhead{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .gevcode{font-size:10px;font-weight:700;letter-spacing:.4px;color:#fff;padding:3px 9px;border-radius:20px}
  .gevname{font-size:14px;font-weight:700;color:var(--txt)}
  .gvgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .gvcard{cursor:pointer;border:1px solid var(--line);background:var(--panel2);border-radius:11px;padding:8px;transition:.14s}
  .gvcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.22)}
  .gvthumb{border-radius:6px;overflow:hidden;pointer-events:none}
  .gvmeta{display:flex;align-items:center;gap:6px;margin-top:7px}
  .gvname{flex:1;font-size:11.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gvdots{display:inline-flex;gap:3px}
  .gvdots i{width:9px;height:9px;border-radius:50%;display:inline-block}
  /* wizard */
  .wsec{margin-bottom:16px}
  .wlbl{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--accent);text-transform:uppercase;margin-bottom:7px}
  .wgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .wgrid5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .wcard{cursor:pointer;border:2px solid var(--line);background:var(--panel2);border-radius:10px;padding:10px;transition:border-color .14s,transform .12s}
  .wcard:hover{transform:translateY(-1px)}
  .wcard.wsel{border-color:var(--accent);background:var(--chip)}
  .wcard.wsel *{color:#fff !important}
  .wtags{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .wtag{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12px;cursor:pointer}
  .wtag .tn{flex:1}
  .wtag .tc{font-family:Consolas,monospace;font-size:10px;color:var(--muted)}
  /* add-to-body buttons (fit 3 across without truncation) */
  .addbody{display:flex;gap:6px}
  .addbody>button{flex:1 1 0;min-width:0;white-space:nowrap;font-size:12px;padding:8px 6px;text-align:center}
  /* active-field readiness banner */
  .ready{display:flex;align-items:center;gap:6px;font-size:11px;border-radius:8px;padding:7px 10px;margin-bottom:8px;border:1px dashed}
  .ready.on{color:#9be7c4;background:rgba(54,192,138,.08);border-color:rgba(54,192,138,.4)}
  .ready.off{color:var(--muted);background:var(--panel2);border-color:var(--line)}
</style>

<div class="app">

  <div class="topbar">

        <span class="bname">Relation<i>ship</i></span>

      </span>

  </div>

  <div class="main">
    <!-- LEFT -->
    <div class="col left">
      <div class="scroll">
        <div class="sectitle">Projetos <span class="muted-count" id="prjCount"></span></div>
        <div id="prjList"></div>
        <div style="display:flex;gap:6px;margin-top:6px">

          <button class="btn sm" id="btnRenPrj" title="Renomear o hotel/projeto">✎</button>
          <button class="btn sm" id="btnDelPrj" title="Apagar o projeto">🗑</button>
        </div>

        <div class="sectitle" id="tplTitle" style="margin-top:18px">Templates</div>
        <div id="tplList"></div>
        <div style="display:flex;gap:6px;margin-top:8px">
          <button class="btn sm" id="btnNewTpl" style="flex:1" title="Criar um novo template em branco">+ Novo</button>
          <button class="btn sm" id="btnDupTpl" title="Duplicar o template atual">⧉</button>
          <button class="btn sm" id="btnDelTpl" title="Apagar o template atual">🗑</button>
        </div>
        <button class="btn sm primary" id="btnWizard" style="width:100%;margin-top:6px">✨ Gerar template (wizard)</button>
        <button class="btn sm" id="btnGallery" style="width:100%;margin-top:6px">🎨 Galeria de modelos</button>

        <div class="sectitle" id="addBlockTitle" style="margin-top:18px">Adicionar bloco</div>
        <div class="addgrid" id="addGrid"></div>
      </div>
    </div>

    <!-- CENTER -->
    <div class="col center">
      <div class="canvas-wrap">
        <div class="subjectbar">
          <label>Assunto do email (<span id="subjLangLbl">PT</span>)</label>
          <input id="subjectInput" placeholder="Ex.: A sua reserva em @COMMERCIALNAME@ está confirmada">
        </div>
        <div class="email">
          <div class="blocks" id="blocks"></div>
        </div>
        <div id="htmlEditor" style="display:none;width:700px;max-width:100%">
          <div id="htmlSrcWrap">
            <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">Código HTML — edita aqui (insere tags pelo separador «Tags»)</label>
            <textarea id="htmlSrc" spellcheck="false" style="width:100%;height:220px;margin-top:4px;background:#0b0d11;border:1px solid var(--line);color:#cdd6e6;font-family:Consolas,monospace;font-size:12.5px;line-height:1.5;padding:10px;border-radius:8px;resize:vertical"></textarea>
          </div>
          <div id="prevLabel" style="margin-top:12px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">Pré-visualização (dados de exemplo)</div>
          <div id="prevWrap" style="background:#e9edf3;border-radius:12px;padding:12px;margin-top:6px">
            <div id="prevScaler" style="position:relative;margin:0 auto;overflow:hidden;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.18)">
              <iframe id="htmlPrev" scrolling="no" style="position:absolute;top:0;left:0;width:640px;border:0;background:#fff;display:block"></iframe>
            </div>
          </div>
          <div id="builder" style="display:none;margin-top:18px"></div>
        </div>
        <div class="hint" id="centerHint" style="margin-top:10px">Clica num bloco para o editar à direita. As tags inserem-se no campo de texto ativo.</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col right">
      <div class="tabs">
        <button data-tab="props" class="active">Configurações</button>
        <button data-tab="tags">Tags</button>
        <button data-tab="style">Estilo geral</button>
      </div>
      <div class="scroll" id="tabProps"></div>
      <div class="scroll" id="tabTags" style="display:none"></div>
      <div class="scroll" id="tabStyle" style="display:none"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">

  </div>
</div>

const $=id=>document.getElementById(id);
function cur(){ const p=proj(); return p ? p.templates.find(t=>t.id===state.currentTemplateId) : null; }
function curLang(){ return cur()[state.lang]; }
function escText(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return escText(s).replace(/"/g,"&quot;"); }
const esc=escText; // alias for text contexts
/* Tokenizer: escapa o texto do utilizador mas mantém as tags @Model[0]... verbatim (o PMS precisa delas exatas). */
function sortedTagCodes(){ return tags.map(t=>t.code).filter(Boolean).sort((a,b)=>b.length-a.length); }
function tokenize(str, attr){
  if(!str) return "";
  const codes=sortedTagCodes(); let out=""; let i=0;
  while(i<str.length){
    let m=null;
    for(const c of codes){ if(str.startsWith(c,i)){ m=c; break; } }
    if(m){ out+=m; i+=m.length; }
    else { const ch=str[i]; out += attr?escAttr(ch):escText(ch); i++; }
  }
  return out;
}
function tokenizeText(s){ return tokenize(s,false).replace(/\n/g,"<br>"); }
function tokenizeAttr(s){ return tokenize(s,true); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }
function dirty(){ $("saveState").textContent="a guardar…"; clearTimeout(window.__sv); window.__sv=setTimeout(save,400); }

/* sample data replacement for preview.
   Highlights tags in text content, but inside HTML tags (attributes like href/src) replaces with plain value. */
function applySample(html){
  const sorted=[...tags].sort((a,b)=>b.code.length-a.code.length);
  const parts=html.split(/(<[^>]*>)/);
  for(let i=0;i<parts.length;i++){
    const isTag=parts[i].charAt(0)==="<";
    let seg=parts[i];
    for(const t of sorted){
      if(!t.code) continue;
      const rep = isTag
        ? esc(t.sample||"")
        : '<span style="background:#fff3cd;color:#7a5b00;padding:0 2px;border-radius:3px">'+esc(t.sample||t.code)+'</span>';
      seg = seg.split(t.code).join(rep);
    }
    parts[i]=seg;
  }
  return parts.join("");
}

/* ============================ EMAIL HTML GENERATION ============================ */
function blockHTML(b){
  const p=b.props;
  const pad=(t,bt)=>`padding-top:${t}px;padding-bottom:${bt}px`;
  switch(b.type){
    case "logo":
    case "image":{
      const w=Math.min(p.width, cur().settings.width);
      let img = p.src
        ? `<img src="${tokenizeAttr(p.src)}" alt="${tokenizeAttr(p.alt)}" width="${w}" style="display:block;width:${w}px;max-width:100%;height:auto;border:0;outline:none;text-decoration:none" />`
        : `<div style="width:${w}px;max-width:100%;height:${b.type==='logo'?60:160}px;background:#eef1f6;border:1px dashed #c7cedb;color:#9aa3b2;font:13px/1.4 Arial;display:flex;align-items:center;justify-content:center">${escText(p.alt||'Imagem')} — sem src</div>`;
      if(p.link) img=`<a href="${tokenizeAttr(p.link)}" target="_blank" style="text-decoration:none">${img}</a>`;
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px">${img}</td></tr>`;
    }
    case "heading":
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px;font-family:${cur().settings.font};font-size:${p.size}px;font-weight:${p.bold?700:400};color:${p.color};line-height:1.3">${tokenizeText(p.text)}</td></tr>`;
    case "paragraph":
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px;font-family:${cur().settings.font};font-size:${p.size}px;color:${p.color};line-height:${p.lineHeight}">${tokenizeText(p.text)}</td></tr>`;
    case "button":{
      const btn=`<table role="presentation" cellpadding="0" cellspacing="0" style="margin:auto"><tr><td align="center" bgcolor="${p.bg}" style="border-radius:${p.radius}px"><a href="${tokenizeAttr(p.url)}" target="_blank" style="display:inline-block;padding:12px 28px;font-family:${cur().settings.font};font-size:15px;font-weight:700;color:${p.color};text-decoration:none;border-radius:${p.radius}px">${tokenizeText(p.text)}</a></td></tr></table>`;
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px">${btn}</td></tr>`;
    }
    case "divider":
      return `<tr><td style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px"><table role="presentation" width="${p.width}%" cellpadding="0" cellspacing="0" style="margin:auto"><tr><td style="border-top:${p.thickness}px solid ${p.color};font-size:0;line-height:0">&nbsp;</td></tr></table></td></tr>`;
    case "spacer":
      return `<tr><td style="height:${p.height}px;line-height:${p.height}px;font-size:0">&nbsp;</td></tr>`;
    case "footer":
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px;font-family:${cur().settings.font};font-size:${p.size}px;color:${p.color};line-height:1.5">${tokenizeText(p.text)}</td></tr>`;
  }
  return "";
}

function buildEmail(lang){
  const t=cur();
  if(t.mode==="html") return (t[lang] && t[lang].html) || "";

    const L=t[lang]||{};

  const s=t.settings; const L=t[lang];

${rows}

}

const PREV_W=664; // largura lógica do preview (email 600 + margens, com folga)
function fitPreview(){
  const f=$("htmlPrev"), wrap=$("prevWrap"), scaler=$("prevScaler");
  if(!f||!wrap||!scaler) return;
  if($("htmlEditor") && $("htmlEditor").style.display==="none") return;
  f.style.width=PREV_W+"px"; f.style.height="";
  const doc=f.contentDocument||f.contentWindow.document;
  let ch=0; try{ ch=Math.max(doc.body?doc.body.scrollHeight:0, doc.documentElement?doc.documentElement.scrollHeight:0); }catch(e){}
  if(!ch) ch=600;
  f.style.height=ch+"px";
  const avail=Math.max(120, wrap.clientWidth - 24);
  const s=Math.min(1, avail/PREV_W);
  f.style.transformOrigin="top left";
  f.style.transform="scale("+s+")";
  scaler.style.width=(PREV_W*s)+"px";
  scaler.style.height=(ch*s)+"px";
}
function refreshHtmlPrev(){
  const f=$("htmlPrev"); if(!f) return;
  const doc=f.contentDocument||f.contentWindow.document;
  doc.open(); doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=664"></head><body style="margin:0;padding:0">'+applySample(buildEmail(state.lang))+'</body></html>'); doc.close();
  fitPreview();
  setTimeout(fitPreview,60);
}

  }
  if(t.mode==="html"){
    document.querySelector(".email").style.display="none";
    $("htmlEditor").style.display="block";
    if($("builder")) $("builder").style.display="none";
    $("htmlSrcWrap").style.display="block";
    if($("prevLabel")) $("prevLabel").textContent="Pré-visualização (dados de exemplo)";
    if($("centerHint")) $("centerHint").textContent="Modo HTML: edita o código acima; usa o separador «Tags» para inserir tokens.";
    const ta=$("htmlSrc");
    if(document.activeElement!==ta) ta.value=curLang().html||"";
    if(!ta.__bound){ ta.__bound=true;
      ta.addEventListener("input",()=>{ curLang().html=ta.value; dirty(); refreshHtmlPrev(); });
      ta.addEventListener("focus",()=>{ state.activeField=ta; });
    }
    refreshHtmlPrev();
    return;
  }
  document.querySelector(".email").style.display="";
  $("htmlEditor").style.display="none";
  if($("centerHint")) $("centerHint").textContent="Clica num bloco para o editar à direita. As tags inserem-se no campo de texto ativo.";
  const L=curLang();
  const wrap=$("blocks"); wrap.innerHTML="";
  $("blocks").parentElement.style.background=t.settings.containerBg;
  document.querySelector(".center").style.background="#0b0d11";
  if(!L.blocks.length){ wrap.innerHTML='<div class="empty-hint">Sem blocos. Adiciona à esquerda.</div>'; return; }
  L.blocks.forEach((b,i)=>{
    const div=document.createElement("div");
    div.className="blk"+(state.selectedBlock===b.id?" sel":"");
    div.innerHTML=`<table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tbody>${blockHTML(b)}</tbody></table>
      <div class="blk-tools">
        <button data-act="up" title="Subir">↑</button>
        <button data-act="down" title="Descer">↓</button>
        <button data-act="dup" title="Duplicar">⧉</button>
        <button data-act="del" title="Remover">🗑</button>
      </div>`;
    div.addEventListener("click",e=>{
      const act=e.target.getAttribute("data-act");
      if(act){ e.stopPropagation(); blockAction(b.id,act); return; }
      state.selectedBlock=b.id; renderCanvas(); renderProps(); switchTab("props");
    });
    wrap.appendChild(div);
  });
}

function blockAction(id,act){
  const L=curLang(); const i=L.blocks.findIndex(b=>b.id===id);
  if(i<0) return;
  if(act==="up"&&i>0){ [L.blocks[i-1],L.blocks[i]]=[L.blocks[i],L.blocks[i-1]]; }
  if(act==="down"&&i<L.blocks.length-1){ [L.blocks[i+1],L.blocks[i]]=[L.blocks[i],L.blocks[i+1]]; }
  if(act==="dup"){ const c=JSON.parse(JSON.stringify(L.blocks[i])); c.id="b"+(_ctr++)+"_"+Math.floor(performance.now()); L.blocks.splice(i+1,0,c); state.selectedBlock=c.id; }
  if(act==="del"){ L.blocks.splice(i,1); if(state.selectedBlock===id) state.selectedBlock=null; }
  dirty(); renderCanvas(); renderProps();
}

function newBodyItem(t){ return t==="cta"?{t:"cta",v:"Texto do botão",u:"@ONLINECHECKIN@"}:t==="img"?{t:"img",v:"",u:""}:{t,v:t==="h"?"Novo título":"Escreve aqui o teu parágrafo."}; }
function builderCard(it,i){
  const NAME={h:"Título",p:"Parágrafo",cta:"Botão",img:"Imagem"};
  const ICON={h:"doc",p:"list",cta:"copy",img:"image"};
  let inner;
  if(it.t==="cta"){
    inner=`<input type="text" value="${escAttr(it.v)}" data-bbv="${i}" data-tagtarget="1" placeholder="Texto do botão" style="width:100%;margin-bottom:6px;${HIN}">

  } else if(it.t==="img"){
    inner=`<div style="display:flex;gap:6px;margin-bottom:6px"><input type="text" value="${escAttr(it.v)}" data-bbv="${i}" placeholder="URL da imagem…" style="flex:1;min-width:0;${HIN}"><button class="btn sm" data-bbpub="${i}" title="Carregar e publicar imagem">⤴</button></div>
      <input type="text" value="${escAttr(it.u||'')}" data-bbu="${i}" data-tagtarget="1" placeholder="Legenda (opcional)" style="width:100%;${HIN}"><div class="hint" id="bbSt${i}" style="margin-top:4px">${it.v?'✓ Imagem definida.':'Cola um link de imagem ou usa ⤴ para publicar.'}</div>`;

function renderBuilder(){
  const b=$("builder"); if(!b) return;
  if(!cur()||cur().mode!=="house"){ b.style.display="none"; return; }
  b.style.display="block";
  const L=curLang();
  const PIECES=[["h","doc","Título"],["p","list","Parágrafo"],["cta","copy","Botão"],["img","image","Imagem"]];
  let h=`<div class="bld-top"><div class="bld-ttl">${ic("doc",16)}<span>Construtor do corpo</span></div><div class="bld-sub">Arrasta uma peça para dentro do email · reordena pelo ⠿ · edita escrevendo. Tudo atualiza a pré-visualização acima.</div></div>`;
  h+=`<div class="bpal">${PIECES.map(p=>`<div class="bpiece" draggable="true" data-add="${p[0]}">${ic(p[1],14)}<span>${p[2]}</span></div>`).join("")}</div>`;
  h+=`<div class="bld-list" id="bldList"><div class="bdz" data-dz="0"></div>`;

  h+=`</div>`;
  b.innerHTML=h;
  bindBuilder(b,L);
}
function bindBuilder(b,L){
  const rebuild=()=>{ dirty(); renderBuilder(); refreshHtmlPrev(); };
  const live=()=>{ dirty(); refreshHtmlPrev(); };
  let drag=null;
  const clearDz=()=>b.querySelectorAll(".bdz").forEach(d=>d.classList.remove("over"));
  b.querySelectorAll(".bpiece").forEach(p=>{
    p.addEventListener("dragstart",e=>{ drag={kind:"new",t:p.dataset.add}; e.dataTransfer.effectAllowed="copy"; try{ e.dataTransfer.setData("text/plain","new"); }catch(_){ } });
    p.addEventListener("dragend",()=>{ drag=null; clearDz(); });
  });
  b.querySelectorAll(".bcard").forEach(card=>{
    const i=+card.dataset.bi, handle=card.querySelector(".bdrag");
    handle.addEventListener("dragstart",e=>{ drag={kind:"move",i:i}; card.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; try{ e.dataTransfer.setData("text/plain","move"); }catch(_){ } });
    handle.addEventListener("dragend",()=>{ drag=null; card.classList.remove("dragging"); clearDz(); });
  });
  b.querySelectorAll(".bdz").forEach(dz=>{
    dz.addEventListener("dragover",e=>{ if(!drag)return; e.preventDefault(); e.dataTransfer.dropEffect=drag.kind==="new"?"copy":"move"; dz.classList.add("over"); });
    dz.addEventListener("dragleave",()=>dz.classList.remove("over"));
    dz.addEventListener("drop",e=>{ if(!drag)return; e.preventDefault(); const at=+dz.dataset.dz;
      if(drag.kind==="new"){ L.body.splice(at,0,newBodyItem(drag.t)); }
      else { const f=drag.i; if(f===at||f===at-1){ drag=null; clearDz(); return; } const item=L.body.splice(f,1)[0]; let to=at; if(f<to)to--; L.body.splice(to,0,item); }
      drag=null; rebuild();
    });
  });
  b.querySelectorAll("[data-bbv]").forEach(el=>{ el.addEventListener("input",()=>{ L.body[+el.dataset.bbv].v=el.value; live(); }); el.addEventListener("focus",()=>{ state.activeField=el; }); });
  b.querySelectorAll("[data-bbu]").forEach(el=>{ el.addEventListener("input",()=>{ L.body[+el.dataset.bbu].u=el.value; live(); }); el.addEventListener("focus",()=>{ state.activeField=el; }); });
  b.querySelectorAll("[data-bbrem]").forEach(el=>el.addEventListener("click",()=>{ L.body.splice(+el.dataset.bbrem,1); rebuild(); }));
  b.querySelectorAll("[data-bbpub]").forEach(el=>el.addEventListener("click",()=>{ const i=+el.dataset.bbpub; publishImageInto(u=>{ L.body[i].v=u; const inp=b.querySelector('[data-bbv="'+i+'"]'); if(inp) inp.value=u; live(); },"bbSt"+i); }));
}

    case "paragraph":

      h+=field("Cor",color(p.color,"color"));
      h+=field("Alinhamento",align(p.align,"align"));
      h+=padFields; break;
    case "button":
      h+=field("Texto",textInput(p.text,"text"));
      h+=field("Link (URL)",textInput(p.url,"url"));
      h+=`<div class="row2">${field("Cor fundo",color(p.bg,"bg"))}${field("Cor texto",color(p.color,"color"))}</div>`;
      h+=`<div class="row2">${field("Arredondado",num(p.radius,"radius",0,40))}${field("Alinhamento",align(p.align,"align"))}</div>`;
      h+=padFields; break;
    case "divider":
      h+=field("Cor",color(p.color,"color"));
      h+=`<div class="row2">${field("Espessura",num(p.thickness,"thickness",1,10))}${field("Largura (%)",num(p.width,"width",10,100))}</div>`;
      h+=padFields; break;

      h+=field("Altura (px)",num(p.height,"height",4,200)); break;

      h+=field("Texto",area(p.text,"text"));

  box.innerHTML=h;

  box.querySelectorAll("[data-bind]").forEach(el=>{

  });
  box.querySelectorAll("[data-imgaction]").forEach(el=>{
    el.addEventListener("click",()=>{ const a=el.getAttribute("data-imgaction"); if(a==="publish") publishImage(p); else embedImage(p); });
  });
}

/* ---- Image publishing / embedding ---- */
function helperBase(){ return (location.protocol==="http:"||location.protocol==="https:") ? "" : "http://localhost:5500"; }
function setImgStatus(msg,id){ const el=document.getElementById(id||"imgStatus"); if(el) el.innerHTML=msg; }
function pickFile(cb){ const i=document.createElement("input"); i.type="file"; i.accept="image/*"; i.onchange=()=>{ if(i.files[0]) cb(i.files[0]); }; i.click(); }
function publishImageInto(setUrl, statusId){
  pickFile(async(file)=>{
    if(file.size>10*1024*1024){ setImgStatus("⚠ Imagem muito grande (>10MB). Reduz primeiro.",statusId); return; }
    setImgStatus("⏳ A publicar… aguarda.",statusId);
    try{
      const res=await fetch(helperBase()+"/upload",{method:"POST",headers:{"X-Filename":file.name,"Content-Type":file.type||"application/octet-stream"},body:file});
      const txt=(await res.text()).trim();
      if(!res.ok||!/^https?:\/\//.test(txt)) throw new Error(txt||("HTTP "+res.status));
      setUrl(txt); dirty(); renderAll(); toast("Imagem publicada ✓");
    }catch(e){
      setImgStatus('⚠ Não consegui publicar. Abre a app pelo <b>Relationship.bat</b> (o ajudante tem de estar a correr).<br><span style="color:#888">'+escText(e.message)+'</span>',statusId);
    }
  });
}
function embedImageInto(setUrl, statusId){
  pickFile((file)=>{
    if(file.size>1.2*1024*1024){ setImgStatus("⚠ Para base64 usa imagens pequenas (<1MB) — o HTML fica enorme.",statusId); }
    const r=new FileReader();
    r.onload=()=>{ setUrl(r.result); dirty(); renderAll(); toast("Imagem embebida (base64)"); };
    r.readAsDataURL(file);
  });
}

/* ============================ RENDER: TAGS ============================ */
function renderTags(filter){
  const box=$("tabTags");
  if(!state.tagFmt) state.tagFmt="token";
  filter=(filter||"").toLowerCase();
  const nTok=tags.filter(t=>tagFormat(t.code)==="token").length;
  const nMod=tags.filter(t=>tagFormat(t.code)==="model").length;
  const fbtn=(v,lbl)=>`<button class="btn sm ${state.tagFmt===v?'primary':''}" data-fmt="${v}" style="flex:1">${lbl}</button>`;
  let h=`<div style="display:flex;gap:6px;margin-bottom:8px">${fbtn("token","@TAGNAME@ ("+nTok+")")}${fbtn("model","@Model[0] ("+nMod+")")}${fbtn("all","Todas")}</div>`;
  h+=`<input class="tagsearch" id="tagSearch" placeholder="🔎 Procurar tag…" value="${esc(filter)}">`;
  h+='<div class="ready off" id="tagReady"></div>';
  h+='<div class="tag-hint">Os teus modelos RelationshipEmail usam <b>@TAGNAME@</b>. A lista <b>@Model[0]</b> é do outro editor.</div>';
  const cats={};
  tags.filter(t=> (state.tagFmt==="all"||tagFormat(t.code)===state.tagFmt) &&
                  (!filter || (t.label.toLowerCase().includes(filter)||t.code.toLowerCase().includes(filter)||t.cat.toLowerCase().includes(filter))))
      .forEach(t=>{ (cats[t.cat]=cats[t.cat]||[]).push(t); });
  const keys=Object.keys(cats);
  if(!keys.length) h+='<div class="tag-hint">Sem resultados.</div>';
  for(const c of keys){
    h+=`<div class="tagcat">${escText(c)}</div>`;
    cats[c].forEach(t=>{
      h+=`<div class="tag" data-code="${escAttr(t.code)}"><div><div class="tlab">${escText(t.label)}</div><div class="tcode">${escText(t.code)}</div></div><div class="ins">inserir ＋</div></div>`;
    });
  }
  h+=`<div style="margin-top:14px;display:flex;gap:6px"><button class="btn sm" id="btnAddTag" style="flex:1">+ Adicionar tag</button><button class="btn sm" id="btnResetTags">↺ Repor</button></div>`;
  box.innerHTML=h;
  box.querySelectorAll("[data-fmt]").forEach(el=>el.addEventListener("click",()=>{ state.tagFmt=el.getAttribute("data-fmt"); renderTags($("tagSearch").value); }));
  $("tagSearch").addEventListener("input",e=>renderTags(e.target.value));
  box.querySelectorAll(".tag").forEach(el=>{
    el.addEventListener("mousedown",e=>{ e.preventDefault(); insertTag(el.getAttribute("data-code")); });
  });
  updateTagReady();
  $("btnAddTag").addEventListener("click",addTagDialog);
  $("btnResetTags").addEventListener("click",()=>{ if(confirm("Repor a lista de tags por defeito?")){ tags=defaultTagSet(); saveTags(); renderTags(); } });
}

function updateTagReady(){
  const el=document.getElementById("tagReady"); if(!el) return;
  const ok=state.activeField && document.body.contains(state.activeField);
  el.className="ready "+(ok?"on":"off");
  el.innerHTML = ok ? "✓ Pronto — a tag entra no campo ativo" : "○ Clica primeiro num campo (assunto, dados ou corpo), depois numa tag";
}
function insertTag(code){
  const el=state.activeField;
  if(!el || !document.body.contains(el)){ toast("Clica primeiro num campo de texto"); return; }
  const s=el.selectionStart??el.value.length, e=el.selectionEnd??el.value.length;
  el.value = el.value.slice(0,s)+code+el.value.slice(e);
  const pos=s+code.length; el.focus(); el.setSelectionRange(pos,pos);
  el.dispatchEvent(new Event("input"));
  state.activeField=el;
}

function addTagDialog(){
  const label=prompt("Nome amigável da tag (ex.: Data check-in):"); if(!label) return;
  const code=prompt("Código exato do PMS (ex.: @Model[0].CheckInDate):"); if(!code) return;
  const cat=prompt("Categoria (Hóspede, Reserva, Empresa, Agência, CRO, Outros):","Reserva")||"Outros";
  const sample=prompt("Valor de exemplo para o preview:","")||"";
  tags.push({cat,label,code,sample}); saveTags(); renderTags(); toast("Tag adicionada");
}

// Usa o Jina Reader (r.jina.ai): renderiza o JavaScript do site e devolve HTML/markdown, com CORS aberto.
async function jinaFetch(url, asHtml){
  const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),22000);
  try{
    const opt={ signal:ctrl.signal };
    if(asHtml) opt.headers={ "x-return-format":"html" };
    const r=await fetch("https://r.jina.ai/"+url, opt);
    if(!r.ok) throw new Error("HTTP "+r.status);
    const t=await r.text();
    if(!t || t.length<40) throw new Error("vazio");
    return t;
  } finally { clearTimeout(to); }
}
function mergeContacts(c, text){
  if(!c.email){ const m=text.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/); if(m && !/\.(png|jpe?g|gif|svg|webp)$/i.test(m[0])) c.email=m[0]; }
  if(!c.phone){ const m=text.match(/\(?\+\d[\d\s().\-]{6,}\d|\b[239]\d{2}[\s.\-]?\d{3}[\s.\-]?\d{3}\b/); if(m){ let p=m[0].replace(/\s+/g," ").trim(); if(p.charAt(0)===")") p=p.slice(1).trim(); const op=(p.match(/\(/g)||[]).length, cp=(p.match(/\)/g)||[]).length; if(cp>op) p=p.replace(/\)\s*$/,"").trim(); c.phone=p; } }
  if(!c.address){ const m=text.match(/[^\n|>*#]*\b\d{4}-\d{3}\b[^\n|>*#]*/); if(m){ let a=m[0].replace(/[#*>|\[\]]/g,"").replace(/^\s*(morada|address|contactos?|telefone|tel|email|e-mail)\s*[:.\-]?\s*/i,"").trim(); if(a.length>4 && a.length<90) c.address=a; } }
}
async function analyzeSite(url){
  let origin=url; try{ origin=new URL(url).origin; }catch(_){}
  const html=await jinaFetch(url,true);
  const r=analyzeHtml(html,url);
  r.contacts=r.contacts||{};
  if(!r.font) r.font=detectFontFromHtml(html);
  // cor: do logótipo (canvas; se o host não tiver CORS, tenta via proxy de imagem weserv)
  if(!r.color && r.logo && r.logo.indexOf("s2/favicons")<0){
    try{
      let col=await dominantColorFromImage(r.logo);
      if(!col){ const px="https://images.weserv.nl/?url="+encodeURIComponent(r.logo.replace(/^https?:\/\//,"")); col=await dominantColorFromImage(px); }
      if(col) r.color=col;
    }catch(_){}
  }
  // contactos podem estar numa subpágina (ex.: /contactos)
  if(!r.contacts.email || !r.contacts.phone){
    const base=origin.replace(/\/+$/,"");
    const paths=["contactos","contacto","contact","contacts","pt/contactos","contactos.html"];
    for(const p of paths){
      if(r.contacts.email && r.contacts.phone) break;
      let md; try{ md=await jinaFetch(base+"/"+p,false); }catch(_){ continue; }
      mergeContacts(r.contacts, md);
    }
  }
  if(!r.contacts.website) r.contacts.website=origin;
  return r;
}
function normUrl(u){ u=(u||"").trim(); if(!u) return ""; if(!/^https?:\/\//i.test(u)) u="https://"+u; return u; }
function normHex(c){ c=(c||"").trim(); const m=c.match(/^#?([0-9a-fA-F]{6}|[0-9a-fA-F]{3})$/); if(!m) return ""; let h=m[1]; if(h.length===3) h=h.split("").map(x=>x+x).join(""); return "#"+h.toLowerCase(); }
function fontLabel(key){ const f=FONT_LIST.find(x=>x[0]===key); return f?f[1]:key; }
function mapFontFamily(fam){
  fam=(fam||"").toLowerCase();
  if(!fam) return "";
  const isSerif=/(serif|playfair|merriweather|lora|georgia|times|garamond|cormorant|baskerville|pt serif|noto serif|cambria)/.test(fam) && !/sans/.test(fam);
  if(isSerif){ if(/playfair|cormorant|garamond/.test(fam)) return "garamond"; if(/georgia/.test(fam)) return "serif"; if(/times/.test(fam)) return "times"; return "elegant"; }
  if(/trebuchet/.test(fam)) return "modern";
  if(/verdana/.test(fam)) return "verdana";
  if(/tahoma/.test(fam)) return "tahoma";
  if(/century|gothic|poppins|futura|montserrat|raleway|oswald|bebas|nunito|work sans|dm sans/.test(fam)) return "century";
  return "sans";
}
function detectFontKey(doc){
  let fam="";
  const gf=doc.querySelector('link[href*="fonts.googleapis.com"]');
  if(gf){ const m=(gf.getAttribute("href")||"").match(/family=([^:&]+)/); if(m) fam=decodeURIComponent(m[1].replace(/\+/g," ")); }
  if(!fam){ const styles=Array.prototype.map.call(doc.querySelectorAll("style"),s=>s.textContent).join(" "); const m=styles.match(/font-family\s*:\s*([^;}{]+)/i); if(m) fam=m[1]; }
  return mapFontFamily(fam);
}
function detectFontFromHtml(html){
  let fam="";
  const m=html.match(/fonts\.googleapis\.com[^"'<> ]*[?&]family=([A-Za-z][A-Za-z0-9+]*)/i);
  if(m) fam=decodeURIComponent(m[1]).replace(/\+/g," ");
  if(!fam){ const s=html.match(/font-family\s*:\s*([^;}{"']+)/i); if(s) fam=s[1]; }
  return mapFontFamily(fam);
}
// extrai a cor dominante (saturada) da imagem do logótipo, via canvas (precisa de CORS na imagem)
function dominantColorFromImage(url){
  return new Promise(function(resolve){
    let done=false; const finish=v=>{ if(!done){ done=true; resolve(v); } };
    try{
      const img=new Image(); img.crossOrigin="anonymous";
      img.onload=function(){ try{
        const w=52,h=52, cv=document.createElement("canvas"); cv.width=w; cv.height=h;
        const ctx=cv.getContext("2d"); ctx.drawImage(img,0,0,w,h);
        const d=ctx.getImageData(0,0,w,h).data, counts={}; let best=null,bestScore=-1;
        for(let i=0;i<d.length;i+=4){
          const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3]; if(a<128) continue;
          const mx=Math.max(r,g,b),mn=Math.min(r,g,b), sat=mx===0?0:(mx-mn)/mx, val=mx/255;
          if(sat<0.30||val<0.22||val>0.96) continue;
          const key=(r>>4)+","+(g>>4)+","+(b>>4); counts[key]=(counts[key]||0)+1;
          const score=counts[key]*(0.55+sat); if(score>bestScore){ bestScore=score; best=[r,g,b]; }
        }
        if(best){ const to=v=>("0"+v.toString(16)).slice(-2); finish("#"+to(best[0])+to(best[1])+to(best[2])); } else finish("");
      }catch(_){ finish(""); } };
      img.onerror=function(){ finish(""); };
      img.src=url;
      setTimeout(()=>finish(""), 8000);
    }catch(_){ finish(""); }
  });
}
function parseJsonLd(doc){
  const out={};
  const blocks=Array.prototype.slice.call(doc.querySelectorAll('script[type="application/ld+json"]'));
  for(const b of blocks){
    let data; try{ data=JSON.parse(b.textContent); }catch(_){ continue; }
    const arr=Array.isArray(data)?data:(data["@graph"]?data["@graph"]:[data]);
    for(const node of arr){
      if(!node||typeof node!=="object") continue;
      if(node.telephone && !out.phone) out.phone=(""+node.telephone).trim();
      if(node.email && !out.email) out.email=(""+node.email).replace(/^mailto:/i,"").trim();
      if(node.url && !out.website && typeof node.url==="string") out.website=node.url.trim();
      if(node.address && !out.address){
        const a=node.address;
        if(typeof a==="string") out.address=a.trim();
        else if(typeof a==="object") out.address=[a.streetAddress,a.postalCode,a.addressLocality,a.addressCountry].filter(Boolean).join(", ");
      }
    }
  }
  return out;
}
function analyzeHtml(html, baseUrl){
  const doc=new DOMParser().parseFromString(html,"text/html");
  let origin=baseUrl; try{ origin=new URL(baseUrl).origin; }catch(_){}
  const abs=u=>{ if(!u) return ""; try{ return new URL(u, baseUrl).href; }catch(_){ return u; } };
  const meta=(sel)=>{ const el=doc.querySelector(sel); return el?(el.getAttribute("content")||el.getAttribute("href")||""):""; };
  const name = meta('meta[property="og:site_name"]') || meta('meta[property="og:title"]') || (doc.title||"").split(/[|\-–—•]/)[0].trim();
  const imgSrc=el=>el?(el.getAttribute("src")||el.getAttribute("data-src")||el.getAttribute("data-lazy-src")||el.getAttribute("data-original")||""):"";
  // logótipo: prioriza imagens explicitamente "logo" (não o og:image, que muitas vezes é um banner)
  let logo = imgSrc(doc.querySelector('img[src*="logo" i],img[alt*="logo" i],img[class*="logo" i],[class*="logo" i] img,[id*="logo" i] img'));
  if(!logo) logo = meta('link[rel~="apple-touch-icon"]');
  if(!logo) logo = imgSrc(doc.querySelector('header img, nav img, a[href="/"] img, a[href="'+origin+'"] img, a[href="'+origin+'/"] img'));
  if(!logo) logo = meta('meta[property="og:image"]');
  if(!logo) logo = meta('link[rel="icon"]') || meta('link[rel~="icon"]');
  if(!logo) logo = imgSrc(doc.querySelector('img'));
  logo = abs(logo);
  if(!logo) logo = "https://www.google.com/s2/favicons?domain="+encodeURIComponent(origin)+"&sz=128";
  let color = normHex(meta('meta[name="theme-color"]'));
  const font = detectFontKey(doc);
  const contacts = parseJsonLd(doc);
  if(!contacts.phone){ const tel=doc.querySelector('a[href^="tel:"]'); if(tel) contacts.phone=(tel.getAttribute("href")||"").replace(/^tel:/i,"").trim(); }
  if(!contacts.email){ const ml=doc.querySelector('a[href^="mailto:"]'); if(ml) contacts.email=(ml.getAttribute("href")||"").replace(/^mailto:/i,"").split("?")[0].trim(); }
  if(!contacts.website) contacts.website=origin;
  return { name:(name||"").slice(0,80), logo, color, font, contacts };
}
function nearestPaletteKey(hex){
  const t=hexToHsl(hex);
  if(t.s<14) return "grafite";
  let best="azul", bestD=1e9;
  for(const k of Object.keys(PALETTES)){
    const ph=hexToHsl(PALETTES[k].accent);
    let dh=Math.abs(ph.h-t.h); if(dh>180) dh=360-dh;
    if(k==="grafite") dh+=120; // só para cores cinzentas (tratado acima)
    if(dh<bestD){ bestD=dh; best=k; }
  }
  return best;
}

  if(!url){ if(msg) msg.innerHTML='<span style="color:var(--danger)">Escreve o endereço do website primeiro.</span>'; return; }
  nf.website=url;
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span> A analisar…'; }
  if(msg) msg.innerHTML='<span style="display:inline-flex;align-items:center;gap:7px"><span class="spin"></span> A ler '+escText(url)+'… (pode demorar uns segundos)</span>';
  try{
    let a=await analyzeViaCloud(url);   // IA (Edge Function), se estiver no ar
    if(!a) a=await analyzeSite(url);     // senão, modo local
    if(a.palette && PALETTES[a.palette]){ nf.palette=a.palette; nf.shade=50; nf.detectedColor=a.color||null; }
    else if(a.color){ nf.palette=nearestPaletteKey(a.color); nf.shade=50; nf.detectedColor=a.color; }
    if(a.font && FONTS[a.font]) nf.font=a.font;
    if(a.design && DESIGNS[a.design]) nf.design=a.design;
    if(a.logo) nf.logo=a.logo;
    if(a.name && !(nf.hotel||"").trim()) nf.hotel=a.name;
    nf.contacts=a.contacts||{};
    nf.analyzed=a;
    renderHome("new");
  }catch(e){
    if(msg) msg.innerHTML='<span style="color:var(--danger)">Não consegui ler o site (o proxy pode estar indisponível ou o site bloquear). Tenta de novo ou preenche à mão.</span>';
    if(btn){ btn.disabled=false; btn.innerHTML=ic("wand",14)+' Analisar'; }
  }
}
function createProjectFromForm(){
  const m=document.getElementById("nfMsg");
  const name=(nf.hotel||"").trim();
  if(!name){ if(m) m.textContent="Dá um nome ao hotel."; return; }
  if(!nf.events.length){ if(m) m.textContent="Escolhe pelo menos um template a desenvolver."; return; }
  const hasContacts = nf.contacts && Object.keys(nf.contacts).some(k=>nf.contacts[k]);
  const p={ id:"prj"+(_ctr++)+"_"+Math.floor(performance.now()), hotel:name, website:nf.website||"", templates:[] };
  nf.events.slice().sort((a,b)=>a-b).forEach(i=>{
    const t=instStarter(STARTERS[i]);
    t.design=nf.design; t.font=nf.font; t.palette=nf.palette; t.shade=nf.shade;
    if(nf.logo) t.brand.logo=nf.logo;
    if(hasContacts) t.contacts=JSON.parse(JSON.stringify(nf.contacts));
    p.templates.push(t);
  });
  state.projects.push(p); state.currentProjectId=p.id; state.currentTemplateId=p.templates[0].id; state.selectedBlock=null; state.lang="pt";
  cloudSyncProject(p); save(); hideHome(); renderAll(); toast("Projeto «"+name+"» criado");
}

/* ============================ LANG UI ============================ */
function setLangUI(){
  document.querySelectorAll("#langToggle button").forEach(b=>b.classList.toggle("active",b.getAttribute("data-lang")===state.lang));
  $("subjLangLbl").textContent=state.lang.toUpperCase();
  $("subjectInput").value=curLang().subject;
}

/* ============================ RENDER ALL ============================ */
function renderAll(){
  renderPrjList();
  if(!cur()){ if(proj()&&proj().templates[0]) state.currentTemplateId=proj().templates[0].id; }
  const t=cur();
  $("tplName").value=t?t.name:"";
  const blocksMode=t&&t.mode==="blocks";
  $("addBlockTitle").style.display=blocksMode?"":"none";
  $("addGrid").style.display=blocksMode?"":"none";
  setLangUI();
  renderTplList(); renderAddGrid(); renderCanvas(); renderProps();
  const at=document.querySelector(".tabs button.active")?.getAttribute("data-tab")||"props";
  if(at==="tags")renderTags(); if(at==="style")renderStyle();
}

/* ============================ EVENTS ============================ */
$("tplName").addEventListener("input",e=>{ cur().name=e.target.value; renderTplList(); dirty(); });
$("subjectInput").addEventListener("input",e=>{ curLang().subject=e.target.value; dirty(); });
$("subjectInput").addEventListener("focus",e=>{ state.activeField=e.target; });
document.querySelectorAll("#langToggle button").forEach(b=>b.addEventListener("click",()=>{ state.lang=b.getAttribute("data-lang"); state.selectedBlock=null; setLangUI(); renderCanvas(); renderProps(); }));
document.querySelectorAll(".tabs button").forEach(b=>b.addEventListener("click",()=>switchTab(b.getAttribute("data-tab"))));
$("btnNewTpl").addEventListener("click",()=>{ const p=proj(); const t=blankTemplate("Novo template "+(p.templates.length+1)); p.templates.push(t); state.currentTemplateId=t.id; state.selectedBlock=null; save(); renderAll(); });
$("btnDupTpl").addEventListener("click",()=>{ const p=proj(); const c=JSON.parse(JSON.stringify(cur())); c.id="tpl"+(_ctr++)+"_"+Math.floor(performance.now()); c.name=cur().name+" (cópia)"; p.templates.push(c); state.currentTemplateId=c.id; save(); renderAll(); });
$("btnDelTpl").addEventListener("click",()=>{ const p=proj(); if(p.templates.length<=1){toast("O projeto tem de ter pelo menos 1 template");return;} if(confirm("Apagar este template?")){ p.templates=p.templates.filter(t=>t.id!==state.currentTemplateId); state.currentTemplateId=p.templates[0].id; save(); renderAll(); } });
$("btnNewPrj").addEventListener("click",()=>{ const name=prompt("Nome do hotel / projeto:"); if(!name) return; const p=newProject(name.trim()); state.projects.push(p); state.currentProjectId=p.id; state.currentTemplateId=p.templates[0].id; state.selectedBlock=null; save(); renderAll(); toast("Projeto criado"); });
$("btnRenPrj").addEventListener("click",()=>{ const p=proj(); const name=prompt("Renomear hotel / projeto:",p.hotel); if(!name) return; p.hotel=name.trim(); save(); renderAll(); });
$("btnDelPrj").addEventListener("click",()=>{ if(state.projects.length<=1){toast("Tem de existir pelo menos 1 projeto");return;} if(confirm("Apagar o projeto «"+proj().hotel+"» e todos os seus templates?")){ const delId=state.currentProjectId; state.projects=state.projects.filter(p=>p.id!==delId); state.currentProjectId=state.projects[0].id; state.currentTemplateId=(state.projects[0].templates[0]||{}).id; cloudDeleteProject(delId); save(); renderAll(); } });
$("btnGallery").addEventListener("click",openGallery);
$("btnWizard").addEventListener("click",openWizard);
document.querySelector(".brand").addEventListener("click",showHome);
// ícones monocromáticos nos botões
$("btnWizard").innerHTML=ic("wand",15)+" Gerar template";
$("btnGallery").innerHTML=ic("grid",15)+" Galeria de modelos";
$("btnNewPrj").innerHTML=ic("plus",15)+" Novo projeto";
$("btnRenPrj").innerHTML=ic("pencil",14);
$("btnDelPrj").innerHTML=ic("trash",14);
$("btnNewTpl").innerHTML=ic("plus",14)+" Novo";
$("btnPreview").innerHTML=ic("eye",15)+" Pré-visualizar";
$("btnExport").innerHTML=ic("copy",15)+" Copiar p/ PMS";
$("btnExport").addEventListener("click",openExport);
$("btnPreview").addEventListener("click",openPreview);
$("modalBg").addEventListener("click",e=>{ if(e.target===$("modalBg")) closeModal(); });
// Track active text field globally for tag insertion + readiness feedback
document.addEventListener("focusin",e=>{ const el=e.target; if(el&&el.getAttribute&&el.getAttribute("data-tagtarget")){ state.activeField=el; } updateTagReady(); });
window.addEventListener("resize",()=>{ clearTimeout(window.__rz); window.__rz=setTimeout(fitPreview,80); });

/* ============================ INIT ============================ */
bootstrap();
