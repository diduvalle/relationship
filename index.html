<html lang="pt">
<head>
<meta charset="UTF-8">

<meta name="twitter:description" content="Construtor de templates de email RelationshipEmail para hotéis — em PT e EN, com as tags do PMS HostPMS.">
<meta name="twitter:image" content="https://relationship.cr0x.org/og-image.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    /* Host Hotel Systems — tema claro (brandbook + COMISSIONS) */
    --bg:#f4f6fb; --panel:#ffffff; --panel2:#f3f5f9; --line:#e5e9f1;
    --txt:#182633; --muted:#5c6b7f; --accent:#0667ff; --accent2:#0048c7;
    --ok:#16a34a; --warn:#d97706; --danger:#dc2626; --chip:#eaf1ff;
    --navy:#182633; --ink:#0f1d2b;
    --sh-sm:0 1px 2px rgba(24,38,51,.06);
    --sh-card:0 10px 30px -12px rgba(24,38,51,.14);
    --sh-glow:0 8px 22px -8px rgba(6,103,255,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:Poppins,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:13.5px}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .app{display:flex;flex-direction:column;height:100vh}

  /* Top bar */
  .topbar{display:flex;align-items:center;gap:12px;height:60px;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);flex:0 0 auto}
  .brand{display:flex;align-items:center;gap:10px;cursor:pointer;margin-right:6px}
  .brand:hover .bname{opacity:.85}
  .brand .bname{font-weight:700;font-size:16px;letter-spacing:.1px;line-height:1;color:var(--navy)}
  .brand .bname i{color:var(--accent);font-style:normal}
  .brand .byhost{font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:3px}
  .brand .stack{display:flex;flex-direction:column}
  .tname{background:var(--panel);border:1px solid var(--line);color:var(--txt);height:38px;padding:0 12px;border-radius:10px;min-width:250px;font-weight:500;box-shadow:var(--sh-sm)}
  .tname:hover{border-color:#d3dbe8}
  .spacer{flex:1}
  .langtoggle{display:flex;align-items:center;gap:2px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px;height:38px}
  .langtoggle button{background:transparent;border:0;color:var(--muted);height:30px;padding:0 11px;font-size:12px;font-weight:600;border-radius:999px;line-height:1}
  .langtoggle button:hover{color:var(--navy)}
  .langtoggle button.active{background:#fff;color:var(--accent);box-shadow:var(--sh-sm)}
  .prevtog{display:flex;align-items:center;gap:2px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:3px;height:32px}
  .prevtog button{background:transparent;border:0;color:var(--muted);height:24px;padding:0 11px;font-size:11px;font-weight:600;border-radius:999px;cursor:pointer;transition:background .15s,color .15s;line-height:1}
  .prevtog button.active{background:#fff;color:var(--accent);box-shadow:var(--sh-sm)}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--txt);height:38px;padding:0 14px;border-radius:10px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:7px;line-height:1;box-shadow:var(--sh-sm)}
  .btn:hover{border-color:#c9d6ee;background:#fbfcff}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
  .btn.ghost{background:transparent;box-shadow:none}
  .btn.sm{height:30px;padding:0 10px;font-size:12px;border-radius:8px}
  .savestate{font-size:11.5px;color:var(--muted);font-weight:500}

  /* Main 3-column */
  .main{display:flex;flex:1;min-height:0}
  .col{display:flex;flex-direction:column;min-height:0}
  .left{width:250px;flex:0 0 250px;background:var(--panel);border-right:1px solid var(--line)}
  .center{flex:1;background:var(--bg);overflow:auto}
  .right{width:305px;flex:0 0 305px;background:var(--panel);border-left:1px solid var(--line)}
  .scroll{overflow:auto;padding:14px}
  .sectitle{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin:8px 4px 8px}

  /* Left: templates + add blocks */
  .tpl-item{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:10px;cursor:pointer;color:var(--muted);font-weight:500}
  .tpl-item:hover{background:var(--panel2)}
  .tpl-item.active{background:var(--chip);color:var(--accent)}
  .tpl-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tpl-item .ico{font-size:13px;flex:0 0 auto}
  .tpl-item .badge{flex:0 0 auto;font-size:10px;font-weight:700;background:var(--panel2);color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:1px 7px}
  .tpl-item.active .badge{background:#fff;color:var(--accent);border-color:transparent}
  .prj-item{font-weight:600}
  .muted-count{font-size:10px;color:var(--muted);font-weight:600}
  .addgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
  .addgrid button{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:8px 4px;font-size:11px}
  .addgrid button:hover{border-color:var(--accent);color:var(--accent)}
  .addgrid .ico{font-size:16px}

  /* Center: canvas (email preview/edit) */
  .canvas-wrap{display:flex;flex-direction:column;align-items:center;padding:26px 24px}
  .subjectbar{width:600px;max-width:100%;margin-bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--sh-sm)}
  .subjectbar label{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:5px}
  .subjectbar input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:9px}
  .email{width:600px;max-width:100%;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:var(--sh-card);border:1px solid var(--line)}
  .blocks{min-height:120px}
  .blk{position:relative;border:2px solid transparent}
  .blk.sel{border-color:var(--accent)}
  .blk:hover .blk-tools{opacity:1}
  .blk-tools{position:absolute;top:4px;right:4px;display:flex;gap:3px;opacity:0;transition:.15s;z-index:3}
  .blk-tools button{background:#fff;border:1px solid var(--line);color:var(--navy);border-radius:8px;width:24px;height:24px;font-size:12px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-sm)}
  .blk-tools button:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .empty-hint{padding:50px 20px;text-align:center;color:var(--muted);font-size:13px}

  /* Right: properties + tags */
  .tabs{display:flex;border-bottom:1px solid var(--line);background:var(--panel)}
  .tabs button{flex:1;background:transparent;border:0;color:var(--muted);padding:12px 6px;font-size:12.5px;font-weight:600;border-bottom:2px solid transparent}
  .tabs button:hover{color:var(--navy)}
  .tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--muted);font-weight:500;margin-bottom:4px}
  .field input[type=text],.field input[type=number],.field textarea,.field select{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:7px 9px;border-radius:9px}
  .field textarea{min-height:90px;resize:vertical;line-height:1.5}
  .row2{display:flex;gap:8px}
  .row2>.field{flex:1}
  .colorrow{display:flex;align-items:center;gap:8px}
  .colorrow input[type=color]{width:36px;height:30px;padding:0;border:1px solid var(--line);border-radius:8px;background:none}
  .seg{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{flex:1;background:var(--panel);border:0;color:var(--muted);padding:6px}
  .seg button.active{background:var(--accent);color:#fff}

  .tagsearch{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:10px;margin-bottom:8px}
  .tagcat{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin:12px 2px 4px;font-weight:700}
  .tag{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent}
  .tag:hover{background:var(--chip);border-color:#d6e4ff}
  .tag .tlab{flex:1;font-size:12.5px}
  .tag .tcode{font-size:10px;color:var(--muted);font-family:Consolas,monospace}
  .tag .ins{font-size:11px;color:var(--accent);opacity:0}
  .tag:hover .ins{opacity:1}
  .tag-hint{font-size:11px;color:var(--muted);background:var(--panel2);border:1px dashed #d3dbe8;border-radius:10px;padding:9px 10px;margin-bottom:8px;line-height:1.5}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(15,29,43,.45);display:none;align-items:center;justify-content:center;z-index:50}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:760px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 60px -18px rgba(24,38,51,.3)}
  .modal h3{margin:0;padding:16px 20px;border-bottom:1px solid var(--line);font-size:15px;font-weight:600;color:var(--navy)}
  .modal .body{padding:16px 20px;overflow:auto}
  .modal .foot{padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:#fafbfe;border-radius:0 0 18px 18px}
  pre.code{background:var(--ink);border:1px solid var(--ink);border-radius:12px;padding:14px;overflow:auto;font-family:Consolas,monospace;font-size:12.5px;line-height:1.55;color:#d5deeb;white-space:pre-wrap;word-break:break-word;max-height:52vh}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:12px;font-weight:600;font-size:13px;opacity:0;transition:.25s;z-index:80}
  .toast.show{opacity:1}
  .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}
  .switchmode{display:flex;gap:6px;margin-bottom:12px}

  /* ===================== UI/UX polish (tema claro) ===================== */
  *{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{background:radial-gradient(1100px 520px at 80% -12%, #e9f0fc 0%, var(--bg) 55%)}
  ::selection{background:rgba(6,103,255,.16)}
  /* scrollbars */
  *{scrollbar-width:thin;scrollbar-color:#c7d0de transparent}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#ccd5e2;border-radius:10px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#b3c0d3;background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}
  /* transitions */
  .btn,.tpl-item,.tab,.tabs button,.addgrid button,.tag,.seg button,.gcard,.langtoggle button{transition:background .15s,border-color .15s,color .15s,transform .12s,box-shadow .15s}
  .btn:active{transform:translateY(1px)}
  .btn.primary{box-shadow:var(--sh-glow)}
  .btn.primary:hover{box-shadow:0 10px 26px -8px rgba(6,103,255,.6)}
  /* top bar */
  .topbar{box-shadow:0 1px 3px rgba(24,38,51,.05)}
  .tname{transition:border-color .15s,box-shadow .15s}
  .tname:focus,input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(6,103,255,.14)}
  /* template list */
  .tpl-item{position:relative;margin-bottom:2px}
  .tpl-item.active{box-shadow:inset 3px 0 0 var(--accent)}
  .tpl-item:hover{transform:translateX(2px)}
  /* add block grid */
  .addgrid button:hover{transform:translateY(-1px);box-shadow:var(--sh-sm)}
  /* tabs underline animation */
  .tabs button{position:relative}
  .tabs button::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;background:var(--accent);border-radius:2px;transform:scaleX(0);transition:transform .18s}
  .tabs button.active::after{transform:scaleX(1)}
  .tabs button.active{border-bottom-color:transparent}
  /* tags */
  .tag:hover{transform:translateX(2px)}
  /* email preview card framing */
  .email{transition:box-shadow .2s}
  #htmlPrev{box-shadow:none}
  /* modal animation */
  .modal{animation:pop .22s cubic-bezier(.2,.8,.2,1)}
  .modal-bg{backdrop-filter:blur(3px)}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  /* gallery cards */
  .gcard:hover{transform:translateY(-3px);box-shadow:var(--sh-card)}
  /* toast */
  .toast{box-shadow:0 14px 34px -10px rgba(24,38,51,.35)}
  .toast.show{animation:toastIn .3s cubic-bezier(.2,.8,.2,1)}
  @keyframes toastIn{from{transform:translateX(-50%) translateY(8px)}to{transform:translateX(-50%) translateY(0)}}
  /* inputs in right panel inherit nicer focus already; placeholder color */
  ::placeholder{color:#9aa7ba}
  /* quick tag chips */
  .qtag{background:var(--chip);border:1px solid #c9dcff;color:var(--accent);font-family:Consolas,monospace;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;font-weight:600;transition:background .14s,transform .12s,box-shadow .14s}
  .qtag:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-1px);box-shadow:var(--sh-glow)}
  .qtag:active{transform:translateY(0)}
  /* cloud login overlay + badge */
  .login-ov{position:fixed;inset:0;z-index:120;display:flex;align-items:safe center;justify-content:center;overflow-y:auto;padding:20px;background:radial-gradient(1100px 520px at 80% -12%, #e9f0fc 0%, var(--bg) 55%)}
  .login-card{width:380px;max-width:100%;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:28px 26px;box-shadow:0 24px 60px -18px rgba(24,38,51,.25);animation:pop .25s cubic-bezier(.2,.8,.2,1)}
  .nf-grid{display:grid;grid-template-columns:1fr 1fr;column-gap:28px;align-items:start}
  @media (max-width:820px){ .nf-grid{grid-template-columns:1fr} }
  .spin{width:15px;height:15px;border:2px solid rgba(127,143,166,.35);border-top-color:currentColor;border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .achips{display:flex;flex-wrap:wrap;gap:6px}
  .achip{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--txt)}
  .adot{width:11px;height:11px;border-radius:50%;display:inline-block;border:1px solid rgba(24,38,51,.15)}
  .login-brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .cloud-badge{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 11px;height:30px}
  .cloud-badge .cb-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
  .cloud-badge .cb-mail{max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
  .cloud-badge a{color:var(--accent);text-decoration:none;font-weight:600}
  /* collapsible accordion (Propriedades) */
  .acc{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--panel);overflow:hidden;box-shadow:var(--sh-sm)}
  .acc-h{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--navy);user-select:none;transition:background .14s}
  .acc-h:hover{background:#fafbfe}
  .acc-x{transition:transform .15s;color:var(--muted);font-size:11px}
  .acc:not(.open) .acc-x{transform:rotate(-90deg)}
  .acc-b{display:none;padding:2px 13px 13px}
  .acc.open .acc-b{display:block}
  /* body items + drag & drop */
  .bitem{border:1px solid var(--line);border-radius:12px;padding:9px;margin-bottom:8px;background:var(--panel2);transition:box-shadow .1s,opacity .1s}
  .bitem-h{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .bitem-type{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent)}
  .drag-h{cursor:grab;color:var(--muted);font-size:15px;line-height:1;padding:0 3px}
  .drag-h:hover{color:var(--accent)}
  .drag-h:active{cursor:grabbing}
  .bitem.dragging{opacity:.45}
  .bitem.drop-before{box-shadow:0 -3px 0 var(--accent)}
  .bitem.drop-after{box-shadow:0 3px 0 var(--accent)}
  /* construtor do corpo (drag & drop, zona central) */
  .bld-top{margin-bottom:11px}
  .bld-ttl{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:var(--navy);letter-spacing:.1px}
  .bld-sub{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.55}
  .bpal{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;padding:11px;border:1px dashed #cdd8e8;border-radius:14px;background:var(--panel)}
  .bpiece{display:inline-flex;align-items:center;gap:7px;cursor:grab;user-select:none;padding:9px 14px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--navy);font-size:12.5px;font-weight:600;box-shadow:var(--sh-sm);transition:transform .1s,border-color .12s,box-shadow .12s}
  .bpiece:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 6px 16px -6px rgba(6,103,255,.3);transform:translateY(-1px)}
  .bpiece:active{cursor:grabbing}
  .bld-list{display:flex;flex-direction:column}
  .bdz{height:9px;border-radius:7px;margin:1px 0;transition:height .12s,border-color .12s,background .12s}
  .bdz.over{height:38px;border:2px dashed var(--accent);background:var(--chip)}
  .bcard{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:10px 11px;box-shadow:var(--sh-sm);transition:opacity .1s,box-shadow .12s}
  .bcard:hover{box-shadow:var(--sh-card)}
  .bcard.dragging{opacity:.4}
  .bcard-h{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .bcard-t{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent)}
  .bdrag{cursor:grab;color:var(--muted);font-size:15px;line-height:1;padding:0 2px}
  .bdrag:hover{color:var(--accent)}
  .bdrag:active{cursor:grabbing}
  .bx{border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 7px;border-radius:6px;line-height:1}
  .bx:hover{background:#fdecec;color:var(--danger)}
  .bld-empty{padding:24px;text-align:center;color:var(--muted);font-size:12.5px;border:1px dashed #cdd8e8;border-radius:12px;background:var(--panel)}
  /* design picker com miniaturas */
  .dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  #tabStyle .dgrid{grid-template-columns:1fr 1fr}
  .dcard{cursor:pointer;border:2px solid var(--line);border-radius:12px;padding:6px;background:var(--panel);transition:border-color .14s,transform .12s}
  .dcard:hover{transform:translateY(-1px);border-color:#c9d6ee}
  .dcard.sel{border-color:var(--accent)}
  .dthumb{border-radius:7px;overflow:hidden}
  .dname{font-size:11.5px;font-weight:600;color:var(--txt);text-align:center;margin-top:5px}
  .dcard.sel .dname{color:var(--accent)}
  /* font picker visual */
  .fontgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .fcard{cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:7px 9px;background:var(--panel);display:flex;align-items:baseline;gap:8px;transition:border-color .14s}
  .fcard:hover{border-color:var(--accent)}
  .fcard.sel{border-color:var(--accent);background:var(--chip)}
  .fcard .fa{font-size:18px;color:var(--txt);line-height:1}
  .fcard .fn{font-size:12px;color:var(--muted)}
  .fcard.sel .fa{color:var(--accent)}
  .fcard.sel .fn{color:var(--accent)}
  /* slider de intensidade */
  .shade-row{display:flex;align-items:center;gap:9px;margin-top:2px}
  .shade-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);flex:0 0 auto}
  .shade-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:linear-gradient(to right,#9db8ff,var(--accent),#0b2e7a);outline:none}
  .shade-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(24,38,51,.25)}
  .shade-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer}
  /* lista de templates do form (1 por linha) */
  .evlist{display:flex;flex-direction:column;gap:6px}
  .evrow{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px;cursor:pointer;box-shadow:var(--sh-sm)}
  .evrow:hover{border-color:#c9d6ee}
  .evrow input{flex:0 0 auto;accent-color:var(--accent)}
  .evrow .tn{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .evrow .ev-code{font-family:Consolas,"SF Mono",monospace;font-size:11.5px;font-weight:700;letter-spacing:.3px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .evrow .ev-desc{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .evrow .tc{font-family:Consolas,monospace;font-size:10px;color:var(--muted)}
  .wsub{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:12px 0 7px}
  /* galeria de modelos */
  .gchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .gchip{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.13s;box-shadow:var(--sh-sm)}
  .gchip:hover{border-color:var(--accent);color:var(--accent)}
  .gchip.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--sh-glow)}
  .gevhead{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .gevcode{font-size:10px;font-weight:700;letter-spacing:.4px;color:#fff;padding:3px 9px;border-radius:20px}
  .gevname{font-size:14px;font-weight:600;color:var(--navy)}
  .gvgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .gvcard{cursor:pointer;border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:8px;transition:.14s;box-shadow:var(--sh-sm)}
  .gvcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--sh-card)}
  .gvthumb{border-radius:7px;overflow:hidden;pointer-events:none}
  .gvmeta{display:flex;align-items:center;gap:6px;margin-top:7px}
  .gvname{flex:1;font-size:11.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gvdots{display:inline-flex;gap:3px}
  .gvdots i{width:9px;height:9px;border-radius:50%;display:inline-block}
  /* wizard */
  .wsec{margin-bottom:16px}
  .wlbl{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--accent);text-transform:uppercase;margin-bottom:7px}
  .wgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .wgrid5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .wcard{cursor:pointer;border:2px solid var(--line);background:var(--panel);border-radius:12px;padding:10px;transition:border-color .14s,transform .12s}
  .wcard:hover{transform:translateY(-1px);border-color:#c9d6ee}
  .wcard.wsel{border-color:var(--accent);background:var(--chip)}
  .wtags{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .wtag{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 9px;font-size:12px;cursor:pointer}
  .wtag:hover{border-color:#c9d6ee}
  .wtag input{accent-color:var(--accent)}
  .wtag .tn{flex:1}
  .wtag .tc{font-family:Consolas,monospace;font-size:10px;color:var(--muted)}
  /* add-to-body buttons (fit 3 across without truncation) */
  .addbody{display:flex;gap:6px}
  .addbody>button{flex:1 1 0;min-width:0;white-space:nowrap;font-size:12px;padding:8px 6px;text-align:center}
  /* active-field readiness banner */
  .ready{display:flex;align-items:center;gap:6px;font-size:11px;border-radius:10px;padding:7px 10px;margin-bottom:8px;border:1px dashed}
  .ready.on{color:#15803d;background:#f0fdf4;border-color:#bbf7d0}
  .ready.off{color:var(--muted);background:var(--panel2);border-color:var(--line)}

  /* ===================== Estrutura repensada (topbar/menu/toolbar) ===================== */
  /* topbar em grelha: as 3 zonas têm as larguras das 3 colunas — as linhas verticais continuam pelo header */
  .topbar{display:grid;grid-template-columns:250px minmax(0,1fr) 340px;padding:0;gap:0}
  .tb-zone{display:flex;align-items:center;height:100%;min-width:0}
  .tb-l{padding:0 16px;border-right:1px solid var(--line)}
  .tb-c{padding:0 18px;gap:12px}
  .tb-r{padding:0 16px;gap:10px;border-left:1px solid var(--line);justify-content:flex-end}
  .tb-doc{display:flex;align-items:center;gap:9px;min-width:0;flex:1 1 auto;overflow:hidden}
  /* CÓDIGO em cima (é o nome no PMS), descrição por baixo — empilhados para o seletor de idiomas nunca ser cortado */
  .tb-id{display:flex;flex-direction:column;justify-content:center;gap:0;min-width:0;flex:1 1 auto}
  .tb-doc .tcodechip{height:auto;padding:0;border:0;background:transparent;font-size:12px;line-height:14px;max-width:100%}
  .tname{background:transparent;border:0;box-shadow:none;font-weight:500;font-size:12.5px;line-height:16px;height:18px;padding:0;color:var(--muted);min-width:60px;width:100%}
  .tname:focus{color:var(--txt)}
  .tb-doc .kindbadge{min-width:0;overflow:hidden}
  .tb-doc .kindbadge span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tb-doc .langtoggle{flex:0 0 auto}
  /* ecrãs de portátil: o crachá do módulo fica só com o ícone (o nome vai para o tooltip) */
  @media (max-width:1439px){ .tb-doc .kindbadge span{display:none} .tb-doc .kindbadge{padding:0 7px;gap:0} }
  .tname:hover{background:var(--panel2);border-color:transparent}
  .tname:focus{background:#fff;border-color:var(--accent)}
  .tb-status{display:flex;align-items:center;gap:10px;margin-right:2px}
  /* cabeçalhos de secção da sidebar com ação integrada */
  .sechead{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 8px}
  .sechead .sectitle{margin:0}
  .btn.icon{width:26px;height:26px;padding:0;border-radius:8px;color:var(--muted)}
  .btn.icon:hover{color:var(--accent)}
  /* ações contextuais nas listas (aparecem ao pairar) */
  .tpl-item .rowact{display:none;align-items:center;gap:2px;flex:0 0 auto}
  .tpl-item:hover .rowact{display:inline-flex}
  .tpl-item:hover .badge{display:none}
  .rowact button{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:0;background:transparent;color:var(--muted);border-radius:6px;padding:0}
  .rowact button:hover{background:#fff;color:var(--accent);box-shadow:var(--sh-sm)}
  .rowact button[data-ract="del"]:hover,.rowact button[data-tact="del"]:hover{color:var(--danger)}
  /* toolbar da pré-visualização */
  .canvas-toolbar{margin-top:14px;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 16px;box-shadow:var(--sh-sm)}
  .ct-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .canvas-toolbar .prevtog{border:0;background:var(--panel2)}
  /* crachá do módulo (Relationship Email / Template Email) na barra de topo */
  .kindbadge{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 10px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap;flex:0 0 auto}
  .kindbadge.k-life{background:var(--chip);color:var(--accent)}
  .kindbadge.k-pms{background:#fef3c7;color:#b45309}
  /* o CÓDIGO é o identificador real no PMS — vem antes da descrição */
  .tcodechip{display:inline-flex;align-items:center;height:24px;padding:0 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);font-family:Consolas,"SF Mono",monospace;font-size:11.5px;font-weight:700;letter-spacing:.3px;color:var(--navy);white-space:nowrap;flex:0 0 auto;max-width:220px;overflow:hidden;text-overflow:ellipsis}
  /* item de template: CÓDIGO em destaque, descrição por baixo */
  .tpl-item.tw{align-items:center;padding:7px 10px}
  .tpl-item.tw .nm{display:flex;flex-direction:column;gap:1px;min-width:0}
  .tpl-item .t-code{font-size:11.5px;font-weight:700;letter-spacing:.3px;font-family:Consolas,"SF Mono",monospace;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tpl-item .t-desc{font-size:11px;font-weight:500;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tpl-item.active .t-code{color:var(--accent2)}
  .tpl-item.active .t-desc{color:var(--accent)}
  /* cabeçalhos dos dois grupos de templates — com destaque a sério */
  .kindhead{display:flex;align-items:center;gap:7px;margin:16px 0 8px;padding:7px 8px 7px 9px;border-radius:10px;border:1px solid transparent}
  .kindhead:first-child{margin-top:2px}
  .kindhead .kh-ic{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;flex:0 0 auto}
  .kindhead .kh-nm{flex:1;min-width:0;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .kindhead .kh-n{flex:0 0 auto;font-size:10px;font-weight:700;min-width:19px;height:19px;padding:0 6px;border-radius:20px;display:inline-flex;align-items:center;justify-content:center}
  .kindhead .kh-add{flex:0 0 auto;width:24px;height:24px;border:0;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;box-shadow:var(--sh-sm);transition:transform .12s,box-shadow .12s}
  .kindhead .kh-add:hover{transform:translateY(-1px);box-shadow:0 4px 12px -4px rgba(24,38,51,.3)}
  .kindhead.k-life{background:var(--chip);border-color:#d6e4ff}
  .kindhead.k-life .kh-ic{background:var(--accent);color:#fff}
  .kindhead.k-life .kh-nm{color:var(--accent2)} /* accent2: contraste >=4.5:1 sobre o chip */
  .kindhead.k-life .kh-n{background:#fff;color:var(--accent2)}
  .kindhead.k-life .kh-add{color:var(--accent2)}
  .kindhead.k-pms{background:#fef8e7;border-color:#f5e3b8}
  .kindhead.k-pms .kh-ic{background:#d97706;color:#fff}
  .kindhead.k-pms .kh-nm{color:#b45309}
  .kindhead.k-pms .kh-n{background:#fff;color:#b45309}
  .kindhead.k-pms .kh-add{color:#b45309}
  /* cabeçalho de fonte de dados no modal de novo modelo */
  .srchead{display:flex;align-items:center;gap:8px;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .srcname{font-size:12.5px;font-weight:700;color:var(--navy)}
  .srccode{font-size:9.5px;font-family:Consolas,monospace;color:var(--muted);background:var(--panel2);border-radius:20px;padding:2px 8px}
  /* cartões de starter dos modelos do PMS */
  .pmsgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .pmscard{display:flex;align-items:flex-start;gap:10px;text-align:left;padding:11px 12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;cursor:pointer;box-shadow:var(--sh-sm);transition:border-color .14s,transform .12s,box-shadow .14s;font-family:inherit;width:100%}
  .pmscard:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 16px -6px rgba(6,103,255,.3)}
  .pmscard-ic{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--chip);color:var(--accent);display:inline-flex;align-items:center;justify-content:center}
  .pmscard-tx{display:flex;flex-direction:column;gap:2px;min-width:0}
  .pmscard-nm{font-size:12px;font-weight:700;letter-spacing:.3px;font-family:Consolas,"SF Mono",monospace;color:var(--navy);word-break:break-all}
  .pmscard-sub{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#b45309;background:#fef3c7;border-radius:20px;padding:1px 6px;font-family:Poppins,sans-serif}
  .pmscard-cd{font-size:12px;font-weight:600;color:var(--txt)}
  .pmscard-ab{font-size:11px;color:var(--muted);line-height:1.45}
  /* fichas dos temas sazonais na galeria: grelha alinhada, ordem de calendário, mês à direita */
  .schips{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:8px}
  .schip{display:flex;align-items:center;gap:9px;width:100%;padding:6px 12px 6px 7px;background:var(--panel);border:1px solid var(--line);border-radius:12px;cursor:pointer;box-shadow:var(--sh-sm);transition:border-color .14s,transform .12s,box-shadow .14s;font-family:inherit;text-align:left}
  .schip-ic{width:31px;height:31px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
  .schip-nm{flex:1;min-width:0;font-size:12.5px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .schip-mo{flex:0 0 auto;font-size:9.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .schip:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 16px -6px rgba(6,103,255,.35)}
  .schip:hover .schip-nm{color:var(--accent)}
  /* chips de tom do texto (à imagem do Hey!Travel AI) */
  .tonechips{display:flex;flex-wrap:wrap;gap:6px}
  .tonechip{height:30px;padding:0 14px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:background .14s,border-color .14s,color .14s;box-shadow:var(--sh-sm)}
  .tonechip:hover{border-color:var(--accent);color:var(--accent)}
  .tonechip.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--sh-glow)}
  /* separadores do painel direito em pílulas (sem quebra de linha) */
  .tabs{gap:6px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .tabs button{height:32px;padding:0 6px;border-radius:999px;background:var(--panel2);color:var(--muted);font-size:12px;border:1px solid transparent;white-space:nowrap}
  .tabs button::after{display:none}
  .tabs button.active{background:var(--chip);color:var(--accent);border-color:#cfe0ff}
  /* painel direito mais largo, igual à zona direita do header */
  .right{width:340px;flex:0 0 340px}
  /* botões nunca quebram texto */
  .btn{white-space:nowrap}
  #inspectBtn{white-space:nowrap}
  /* sidebar: grupo de criação ancorado ao fundo; títulos com ellipsis */
  .left .scroll{display:flex;flex-direction:column}
  .left .scroll>*{flex:0 0 auto}
  .side-bottom{margin-top:auto;padding-top:18px}
  .sechead .sectitle{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px}
  /* centro = mesa de trabalho (pontilhado subtil, deixa de parecer espaço morto) */
  .center{background-color:#eef2f8;background-image:radial-gradient(rgba(24,38,51,.06) 1px,transparent 1px);background-size:22px 22px}
  .canvas-wrap{width:100%;padding:24px 28px}
  /* modo construtor em ecrã largo: pré-visualização e construtor lado a lado */
  #htmlEditor:not(.split){max-width:760px;margin:0 auto}
  #htmlEditor.split{display:grid !important;grid-template-columns:minmax(480px,664px) minmax(380px,600px);grid-template-areas:"tb builder" "prev builder";gap:0 26px;justify-content:center;align-items:start;max-width:1380px;margin:0 auto}
  #htmlEditor.split .canvas-toolbar{grid-area:tb;margin-top:0;margin-bottom:12px}
  #htmlEditor.split #prevWrap{grid-area:prev;margin-top:0;position:sticky;top:14px}
  #htmlEditor.split #builder{grid-area:builder;margin-top:0 !important}
  @media (max-width:1460px){ #htmlEditor.split{display:block !important;max-width:760px} #htmlEditor.split #prevWrap{position:static} }
</style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tb-zone tb-l">
      <div class="brand" title="Relationship by Host Hotel Systems">
        <img src="favicon.png" width="24" height="24" alt="Host" style="display:block;flex:0 0 auto">
        <span class="stack">
          <span class="bname">Relation<i>ship</i></span>
          <span class="byhost">by Host Hotel Systems</span>
        </span>
      </div>
    </div>
    <div class="tb-zone tb-c">
      <div class="tb-doc">
        <span class="kindbadge" id="kindBadge"></span>
        <span class="tb-id">
          <span class="tcodechip" id="tplCode" title="Código do template no PMS — é este o identificador que o PMS usa"></span>
          <input class="tname" id="tplName" placeholder="Descrição do template" title="Descrição do template (nome amigável) — escreve para renomear">
        </span>
        <div class="langtoggle" id="langToggle" title="Idioma do conteúdo que estás a editar (a ordem é a do PMS)">
          <button data-lang="en">EN</button>
          <button data-lang="es">ES</button>
          <button data-lang="fr">FR</button>
          <button data-lang="pt" class="active">PT</button>
          <button data-lang="de">DE</button>
          <button data-lang="it">IT</button>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="tb-status">
        <span class="cloud-badge" id="cloudBadge" style="display:none"></span>
        <span class="savestate" id="saveState">guardado</span>
      </div>
    </div>
    <div class="tb-zone tb-r">
      <button class="btn ghost" id="btnPreview" title="Ver o email em grande, com todos os idiomas">👁 Pré-visualizar</button>
      <button class="btn primary" id="btnExport" title="Obter o Assunto + HTML para colar no PMS">⤓ Copiar p/ PMS</button>
    </div>
  </div>

  <div class="main">
    <!-- LEFT -->
    <div class="col left">
      <div class="scroll">
        <div class="sechead">
          <span class="sectitle">Projetos <span class="muted-count" id="prjCount"></span></span>
          <button class="btn sm icon" id="btnNewPrj" title="Criar um projeto para um hotel"></button>
        </div>
        <div id="prjList"></div>

        <div class="sechead" style="margin-top:20px">
          <span class="sectitle" id="tplTitle">Templates</span>
        </div>
        <div id="tplList"></div>
        <span style="display:none"><button id="btnNewTpl"></button></span>

        <div class="sectitle" id="addBlockTitle" style="margin-top:20px">Adicionar bloco</div>
        <div class="addgrid" id="addGrid"></div>

        <!-- Grupo de criação assistida, ancorado ao fundo da sidebar -->
        <div class="side-bottom">
          <div class="sectitle">Criar com ajuda</div>
          <button class="btn sm primary" id="btnWizard" style="width:100%">Gerar template</button>
          <button class="btn sm" id="btnGallery" style="width:100%;margin-top:6px">Galeria de modelos</button>
        </div>

        <!-- Ações contextuais das listas (disparadas pelos ícones de cada item) -->
        <span style="display:none">
          <button id="btnRenPrj"></button><button id="btnDelPrj"></button>
          <button id="btnDupTpl"></button><button id="btnDelTpl"></button>
        </span>
      </div>
    </div>

    <!-- CENTER -->
    <div class="col center">
      <div class="canvas-wrap">
        <div class="subjectbar">
          <label>Assunto do email (<span id="subjLangLbl">PT</span>)</label>
          <input id="subjectInput" placeholder="Ex.: A sua reserva em @COMMERCIALNAME@ está confirmada">
        </div>
        <div class="email">
          <div class="blocks" id="blocks"></div>
        </div>
        <div id="htmlEditor" style="display:none;width:100%">
          <div id="htmlSrcWrap">
            <label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">Código HTML — edita aqui (insere tags pelo separador «Tags»)</label>

/* ============================ OS DOIS MÓDULOS DO PMS ============================
   life = Relationship Email (Utilitários → Relationship Email) · tags @TAGNAME@
   pms  = Modelos de E-mail  (Config. Geral → Relacionamento com o hóspede) · tags @Model[0]
   O PROJETO é o hotel (marca partilhada); é o TEMPLATE que pertence a um dos mundos. */
const KINDS={
  life:{ key:"life", label:"Relationship Email", icon:"mail", fmt:"token", source:"RelationShipEmail",
    where:"PMS → Utilitários → Relationship Email",
    hint:"Emails automáticos do ciclo de estadia. Disparados por evento (NEW, BEFORE-CHECKIN, …)." },
  pms:{ key:"pms", label:"Template Email", icon:"doc", fmt:"model", source:"ReservationsWithNation",
    where:"PMS → Configuração Geral → Relacionamento com o hóspede → Modelos de E-mail",
    hint:"Modelos livres sobre reservas (confirmação, cotação, pagamento…). Fonte de dados: ReservationsWithNation." }
};
function tkind(t){ return (t && t.kind==="pms") ? "pms" : "life"; }
function kinfo(t){ return KINDS[tkind(t)]; }
/* O CÓDIGO é o identificador do template no PMS — é ele o nome principal em toda a app.
   Nos Template Email vem de pms.code; nos Relationship Email de t.code (ou, nos antigos, do modelo-base). */
function tcode(t){
  if(!t) return "";
  if(tkind(t)==="pms") return (t.pms && t.pms.code) || "";
  if(t.code) return t.code;
  const st=(typeof starterFor==="function") ? starterFor(t) : null;
  return (st && st.code) || "";
}

/* Idiomas extra a semear nos modelos-base novos, além de pt/en. */
const EXTRA_LANGS = ["es","it","de","fr"];

function instStarter(st){
  if(st.mode==="house"){
    const clone=o=>JSON.parse(JSON.stringify(o));
    const t={
      id:"tpl"+(_ctr++)+"_"+Math.floor(performance.now()),
      name: st.name, code: st.code||"", mode:"house", design: st.design||"moderno", font: st.font||"sans", palette: st.palette||"azul",
      brand: clone(st.brand||{logo:"",hero:""}),
      settings:{ width:0 },
      pt:{ subject:st.pt.subject, data:clone(st.pt.data||[]), body:clone(st.pt.body||[]) },
      en:{ subject:st.en.subject, data:clone(st.en.data||[]), body:clone(st.en.body||[]) }
    };
    const tr=STARTER_I18N[st.code]||{};
    EXTRA_LANGS.forEach(function(lc){ if(tr[lc]) t[lc]={ subject:tr[lc].subject, data:clone(tr[lc].data||[]), body:clone(tr[lc].body||[]) }; });
    return t;
  }
  if(st.mode==="html"){
    return {
      id:"tpl"+(_ctr++)+"_"+Math.floor(performance.now()),
      name: st.name, mode:"html",
      settings:{ bg:"#f2f4f7", containerBg:"#ffffff", font:'"Segoe UI", Arial, sans-serif', width:815 },
      pt:{ subject:st.pt.subject, html:st.pt.html },
      en:{ subject:st.en.subject, html:st.en.html }
    };
  }
  const t={
    id:"tpl"+(_ctr++)+"_"+Math.floor(performance.now()),
    name: st.name, mode:"blocks",
    settings:{ bg:"#f2f4f7", containerBg:"#ffffff", font:'"Segoe UI", Arial, sans-serif', width:600 },
    pt:{ subject:st.pt.subject, blocks:[] },
    en:{ subject:st.en.subject, blocks:[] }
  };
  ["pt","en"].forEach(lang=>{
    t[lang].blocks = st[lang].blocks.map(([type,over])=>{ const b=newBlock(type); Object.assign(b.props, over||{}); return b; });
  });
  return t;
}

/* ============================ PERSISTENCE ============================ */
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({projects:state.projects,currentProjectId:state.currentProjectId,currentTemplateId:state.currentTemplateId})); }
  catch(e){ document.getElementById("saveState").textContent="⚠ não guardado (usa Backup)"; return; }
  if(CLOUD && cloudStarted){
    setSyncState("a sincronizar…");
    const pid=state.currentProjectId; clearTimeout(window.__cs);
    window.__cs=setTimeout(()=>{ const p=state.projects.find(x=>x.id===pid); if(p) cloudSyncProject(p); },700);
  } else { document.getElementById("saveState").textContent="guardado"; }
}
function load(){
  try{
    const s=localStorage.getItem(LS_KEY);
    if(s){ const d=JSON.parse(s);
      if(d.projects){ state.projects=d.projects; state.currentProjectId=d.currentProjectId; state.currentTemplateId=d.currentTemplateId; }
      else if(d.templates){ // migração do formato antigo (lista plana de templates)
        const p={ id:"prj"+(_ctr++)+"_"+Math.floor(performance.now()), hotel:"Projeto 1", templates:d.templates };
        state.projects=[p]; state.currentProjectId=p.id; state.currentTemplateId=d.currentId;
      }
    }
  }catch(e){}
  if(!state.projects.length){ const p=newProject("Hotel exemplo"); state.projects.push(p); state.currentProjectId=p.id; }
  if(!proj()) state.currentProjectId=state.projects[0].id;
  if(!cur()) state.currentTemplateId=(proj().templates[0]||{}).id;
}

function cur(){ const p=proj(); return p ? p.templates.find(t=>t.id===state.currentTemplateId) : null; }

const LANG_CODES=LANGS.map(l=>l.code);
function langInfo(code){ return LANGS.find(l=>l.code===code)||LANGS.find(l=>l.code==="pt"); }
/* Garante que o template t tem o slot do idioma code; se não, cria-o clonando pt (fallback en). */
/* Modelo-base de origem: ciclo de estadia → pelo NOME; modelo do PMS → pelo CÓDIGO. */
function starterFor(t){
  if(!t) return null;
  if(tkind(t)==="pms"){ const c=(t.pms&&t.pms.code)||""; return c?(PMS_STARTERS.find(s=>s.code===c)||null):null; }
  return t.name ? (STARTERS.find(s=>s.name===t.name)||null) : null;
}
function sameHouse(a,b){ return !!a && !!b && JSON.stringify([a.subject,a.data,a.body])===JSON.stringify([b.subject,b.data,b.body]); }
const clLang = o=>JSON.parse(JSON.stringify(o||[]));
/* Traduções: nos modelos do ciclo vivem no STARTER_I18N; nos do PMS vivem no próprio starter. */
function starterTr(t, code){
  const st=starterFor(t); if(!st) return null;
  const tr = (tkind(t)==="pms") ? st[code] : (STARTER_I18N[st.code]||{})[code];
  return tr ? {st:st, tr:tr} : null;
}
function ensureLang(t, code){
  if(!t) return null;
  /* Nos modelos do ciclo, o EN é escrito à mão (não se toca). Nos do PMS, o EN também vem do starter. */
  const enIsTranslatable = tkind(t)==="pms";
  if(!t[code]){
    const src = t.pt || t.en || {};
    if(t.mode==="html")        t[code]={ subject: src.subject||"", html: src.html||"" };
    else if(t.mode==="blocks") t[code]={ subject: src.subject||"", blocks: clLang(src.blocks) };
    else {
      // Modelo-base conhecido → usa a tradução pronta; senão clona o PT.
      const s = (code!=="pt" && (enIsTranslatable || code!=="en")) ? starterTr(t, code) : null;
      if(s) t[code]={ subject:s.tr.subject, data:clLang(s.tr.data), body:clLang(s.tr.body) };
      else t[code]={ subject: src.subject||"", data: clLang(src.data), body: clLang(src.body) };
    }
    return t[code];
  }
  /* Auto-cura: um idioma que ainda seja só uma cópia por traduzir do PT é substituído pela tradução do starter.
     (é isto que conserta os modelos do PMS criados antes de as traduções existirem) */
  if(t.mode==="house" && code!=="pt" && (enIsTranslatable || code!=="en")){
    const s = starterTr(t, code);
    if(s && sameHouse(t[code], t.pt))
      t[code]={ subject:s.tr.subject, data:clLang(s.tr.data), body:clLang(s.tr.body) };
  }
  return t[code];
}
function curLang(){ return ensureLang(cur(), state.lang); }
function escText(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function escAttr(s){ return escText(s).replace(/"/g,"&quot;"); }
const esc=escText; // alias for text contexts
/* Tokenizer: escapa o texto do utilizador mas mantém as tags @Model[0]... verbatim (o PMS precisa delas exatas). */
function sortedTagCodes(){ return tags.map(t=>t.code).filter(Boolean).sort((a,b)=>b.length-a.length); }
function tokenize(str, attr){
  if(!str) return "";
  const codes=sortedTagCodes(); let out=""; let i=0;
  while(i<str.length){
    let m=null;
    for(const c of codes){ if(str.startsWith(c,i)){ m=c; break; } }
    if(m){ out+=m; i+=m.length; }
    else { const ch=str[i]; out += attr?escAttr(ch):escText(ch); i++; }
  }
  return out;
}
function tokenizeText(s){ return tokenize(s,false).replace(/\n/g,"<br>"); }
function tokenizeAttr(s){ return tokenize(s,true); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }
function dirty(){ $("saveState").textContent="a guardar…"; clearTimeout(window.__sv); window.__sv=setTimeout(save,400); }

/* sample data replacement for preview.
   Highlights tags in text content, but inside HTML tags (attributes like href/src) replaces with plain value. */
function applySample(html){
  /* amostras da FONTE do template atual (Reservas e Faturas têm campos com o mesmo nome mas grafias diferentes) */
  const mine=(typeof cur==="function" && cur()) ? tagsFor(cur()) : tags;
  const sorted=[...(mine.length?mine:tags)].sort((a,b)=>b.code.length-a.code.length);
  const parts=html.split(/(<[^>]*>)/);
  for(let i=0;i<parts.length;i++){
    const isTag=parts[i].charAt(0)==="<";
    let seg=parts[i];
    for(const t of sorted){
      if(!t.code) continue;
      const rep = isTag
        ? esc(t.sample||"")
        : '<span style="background:#fff3cd;color:#7a5b00;padding:0 2px;border-radius:3px">'+esc(t.sample||t.code)+'</span>';
      seg = seg.split(t.code).join(rep);
    }
    /* sub-modelos do PMS: @@@CODIGO(0) — mostra-os identificados na pré-visualização */
    if(!isTag) seg = seg.replace(/@@@([A-Z0-9_-]+)\(\d\)/g,
      (m,c)=>'<span style="background:#fef3c7;color:#b45309;border:1px dashed #f0c674;padding:1px 6px;border-radius:5px;font-size:12px">⧉ sub-modelo: '+esc(c)+'</span>');
    parts[i]=seg;
  }
  return parts.join("");
}

/* ============================ EMAIL HTML GENERATION ============================ */
function blockHTML(b){
  const p=b.props;
  const pad=(t,bt)=>`padding-top:${t}px;padding-bottom:${bt}px`;
  switch(b.type){
    case "logo":
    case "image":{
      const w=Math.min(p.width, cur().settings.width);
      let img = p.src
        ? `<img src="${tokenizeAttr(p.src)}" alt="${tokenizeAttr(p.alt)}" width="${w}" style="display:block;width:${w}px;max-width:100%;height:auto;border:0;outline:none;text-decoration:none" />`
        : `<div style="width:${w}px;max-width:100%;height:${b.type==='logo'?60:160}px;background:#eef1f6;border:1px dashed #c7cedb;color:#9aa3b2;font:13px/1.4 Arial;display:flex;align-items:center;justify-content:center">${escText(p.alt||'Imagem')} — sem src</div>`;
      if(p.link) img=`<a href="${tokenizeAttr(ctaUrl(p.link))}" target="_blank" style="text-decoration:none">${img}</a>`;
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px">${img}</td></tr>`;
    }
    case "heading":
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px;font-family:${cur().settings.font};font-size:${p.size}px;font-weight:${p.bold?700:400};color:${p.color};line-height:1.3">${tokenizeText(p.text)}</td></tr>`;
    case "paragraph":
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px;font-family:${cur().settings.font};font-size:${p.size}px;color:${p.color};line-height:${p.lineHeight}">${tokenizeText(p.text)}</td></tr>`;
    case "button":{
      const btn=`<table role="presentation" cellpadding="0" cellspacing="0" align="center" style="margin:auto"><tr><td align="center" bgcolor="${p.bg}" style="border-radius:${p.radius}px"><a href="${tokenizeAttr(ctaUrl(p.url))}" target="_blank" style="display:inline-block;padding:12px 28px;font-family:${cur().settings.font};font-size:15px;font-weight:700;color:${p.color};text-decoration:none;border-radius:${p.radius}px">${fcol(tokenizeText(p.text),p.color,true)}</a></td></tr></table>`;
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px">${btn}</td></tr>`;
    }
    case "divider":
      return `<tr><td align="center" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px"><table role="presentation" width="${p.width}%" cellpadding="0" cellspacing="0" align="center" style="margin:auto"><tr><td style="border-top:${p.thickness}px solid ${p.color};font-size:0;line-height:0">&nbsp;</td></tr></table></td></tr>`;
    case "spacer":
      return `<tr><td style="height:${p.height}px;line-height:${p.height}px;font-size:0">&nbsp;</td></tr>`;
    case "footer":
      return `<tr><td align="${p.align}" style="${pad(p.padTop,p.padBottom)};padding-left:24px;padding-right:24px;font-family:${cur().settings.font};font-size:${p.size}px;color:${p.color};line-height:1.5">${tokenizeText(p.text)}</td></tr>`;
  }
  return "";
}

function buildEmail(lang, editable, forExport){
  const t=cur();
  if(t.mode==="html") return (t[lang] && t[lang].html) || "";
  if(t.mode==="house"){
    const L=t[lang]||{};
    const isSub=tkind(t)==="pms" && t.pms && t.pms.sub;
    /* no export, hero vazio ou igual ao placeholder fica vazio (o picsum é só para pré-visualizar) */
    const bh=(t.brand&&t.brand.hero)||"";
    const hero=isSub?"":((bh&&bh!==DEFAULT_HERO)?bh:(forExport?"":DEFAULT_HERO));
    return houseHTML({ fragment:!!isSub, design:t.design||"moderno", font:t.font||"sans", lang:lang, palette: shadedPalette(pal(t.palette), t.shade), width: (t.settings&&t.settings.width)||0,
      logo:isSub?"":((t.brand&&t.brand.logo)||""), hero:hero, contacts:isSub?null:(t.contacts||null), data:isSub?[]:(L.data||[]), body:L.body||[], editable: editable===true });
  }
  const s=t.settings; const L=t[lang];
  /* no export, blocos de imagem sem src são omitidos (o placeholder "sem src" é só para o editor) */
  const blocks=forExport?L.blocks.filter(b=>!((b.type==="image"||b.type==="logo")&&!(b.props&&b.props.src))):L.blocks;
  const rows=blocks.map(blockHTML).join("\n");
  return `<table role="presentation" width="100%" cellpadding="0" cellspacing="0" bgcolor="${s.bg}" style="background-color:${s.bg};margin:0;padding:0">

${rows}
</table>
</td></tr>
</table>`;
}

const PREV_DESKTOP=664, PREV_MOBILE=390; // larguras lógicas do preview
let previewW=PREV_DESKTOP;
function fitPreview(){
  const f=$("htmlPrev"), wrap=$("prevWrap"), scaler=$("prevScaler");
  if(!f||!wrap||!scaler) return;
  if($("htmlEditor") && $("htmlEditor").style.display==="none") return;
  f.style.width=previewW+"px"; f.style.height="";
  const doc=f.contentDocument||f.contentWindow.document;
  let ch=0; try{ ch=Math.max(doc.body?doc.body.scrollHeight:0, doc.documentElement?doc.documentElement.scrollHeight:0); }catch(e){}
  if(!ch) ch=600;
  f.style.height=ch+"px";
  const avail=Math.max(120, wrap.clientWidth - 24);
  const s=Math.min(1, avail/previewW);
  f.style.transformOrigin="top left";
  f.style.transform="scale("+s+")";
  scaler.style.width=(previewW*s)+"px";
  scaler.style.height=(ch*s)+"px";

function refreshHtmlPrev(){
  const f=$("htmlPrev"); if(!f) return;

function blockAction(id,act){
  const L=curLang(); const i=L.blocks.findIndex(b=>b.id===id);
  if(i<0) return;
  if(act==="up"&&i>0){ [L.blocks[i-1],L.blocks[i]]=[L.blocks[i],L.blocks[i-1]]; }
  if(act==="down"&&i<L.blocks.length-1){ [L.blocks[i+1],L.blocks[i]]=[L.blocks[i],L.blocks[i+1]]; }
  if(act==="dup"){ const c=JSON.parse(JSON.stringify(L.blocks[i])); c.id="b"+(_ctr++)+"_"+Math.floor(performance.now()); L.blocks.splice(i+1,0,c); state.selectedBlock=c.id; }
  if(act==="del"){ L.blocks.splice(i,1); if(state.selectedBlock===id) state.selectedBlock=null; }
  dirty(); renderCanvas(); renderProps();
}

const TONES=[

function toneChipsHTML(sel){ return '<div class="tonechips">'+TONES.map(t=>`<button type="button" class="tonechip${sel===t[0]?' on':''}" data-tone="${t[0]}">${t[1]}</button>`).join("")+'</div>'; }
/* A IA tem de usar as tags do MÓDULO do template — nunca as do outro (senão o email sai partido). */
function tagDirective(){
  const src=tsource(cur());

  /* curto de propósito: a função corta a instruction aos 400 caracteres */
  const ex=(QUICK[src]||[]).slice(0,4).join(", ");

}
function toneInstruction(tone,brief){ const t=TONES.find(x=>x[0]===tone); const parts=[]; const d=tagDirective(); if(d) parts.push(d); if(t&&t[2]) parts.push(t[2]); if(brief) parts.push(brief); return parts.join(" ").slice(0,400); }
function bindToneChips(boxSel,onPick){ document.querySelectorAll(boxSel+" .tonechip").forEach(el=>el.addEventListener("click",()=>{ document.querySelectorAll(boxSel+" .tonechip").forEach(x=>x.classList.toggle("on",x===el)); onPick(el.dataset.tone); })); }
let aiTone="neutro";

async function translateWithAI(btn, box){
  if(!CLOUD || !sb){ toast("A tradução por IA precisa da cloud configurada."); return; }
  const t=cur(); if(!t) return;
  const to=state.lang; if(to==="pt"){ toast("O PT é o idioma de origem."); return; }
  const src = ensureLang(t,"pt");
  if(!confirm("Traduzir o conteúdo PT para "+langInfo(to).name+" com IA? Substitui o assunto, as etiquetas da caixa de dados e o corpo em "+langInfo(to).label+". As tags @…@ são mantidas.")) return;
  const old=btn?btn.innerHTML:"";
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span> A traduzir…'; }
  try{
    const { data, error } = await sb.functions.invoke("analyze-site", { body:{ action:"translate", lang:to, subject:src.subject||"", data:src.data||[], body:src.body||[] } });
    if(error || !data || data.error) throw new Error((data&&data.error)||"sem resposta");
    const dst = ensureLang(t,to);
    if(typeof data.subject==="string") dst.subject=data.subject;
    if(Array.isArray(data.data)) dst.data=data.data.map(r=>[String((r&&r[0])||""), String((r&&r[1])!=null?r[1]:"")]);
    if(Array.isArray(data.body)) dst.body=data.body.map(bk=>{ const ty=bk&&bk.t==="cta"?"cta":(bk&&bk.t==="h"?"h":(bk&&bk.t==="img"?"img":"p")); const o={t:ty,v:String((bk&&bk.v)||"")}; if(ty==="cta"||ty==="img") o.u=String((bk&&bk.u)||(ty==="cta"?"#":"")); return o; });
    dirty(); renderHouseProps(box); renderCanvas();
    toast("Traduzido para "+langInfo(to).name+" — revê e ajusta.");
  }catch(e){
    if(btn){ btn.disabled=false; btn.innerHTML=old; }
    toast("Não consegui traduzir. Tenta de novo.");
  }
}

function bindBuilder(b,L){

      let v=el.value;
      if(el.type==="number") v=parseFloat(v)||0;
      p[k]=v;
      // sync paired color/text
      box.querySelectorAll(`[data-bind="${k}"]`).forEach(o=>{ if(o!==el) o.value=el.value; });
      dirty(); renderCanvas();
    });
    if(el.getAttribute("data-tagtarget")) el.addEventListener("focus",()=>{ state.activeField=el; });
  });
  box.querySelectorAll("[data-seg]").forEach(el=>{
    el.addEventListener("click",()=>{ p[el.getAttribute("data-seg")]=el.getAttribute("data-val"); dirty(); renderProps(); renderCanvas(); });
  });
  box.querySelectorAll("[data-imgaction]").forEach(el=>{
    el.addEventListener("click",()=>{ const a=el.getAttribute("data-imgaction"); if(a==="publish") publishImage(p); else embedImage(p); });
  });
}

/* ---- Image publishing / embedding ---- */
function helperBase(){ return (location.protocol==="http:"||location.protocol==="https:") ? "" : "http://localhost:5500"; }
function setImgStatus(msg,id){ const el=document.getElementById(id||"imgStatus"); if(el) el.innerHTML=msg; }
function pickFile(cb){ const i=document.createElement("input"); i.type="file"; i.accept="image/*"; i.onchange=()=>{ if(i.files[0]) cb(i.files[0]); }; i.click(); }
function publishImageInto(setUrl, statusId){
  pickFile(async(file)=>{
    if(file.size>10*1024*1024){ setImgStatus("⚠ Imagem muito grande (>10MB). Reduz primeiro.",statusId); return; }
    setImgStatus("⏳ A publicar… aguarda.",statusId);
    try{
      const res=await fetch(helperBase()+"/upload",{method:"POST",headers:{"X-Filename":file.name,"Content-Type":file.type||"application/octet-stream"},body:file});
      const txt=(await res.text()).trim();
      if(!res.ok||!/^https?:\/\//.test(txt)) throw new Error(txt||("HTTP "+res.status));
      setUrl(txt); dirty(); renderAll(); toast("Imagem publicada ✓");
    }catch(e){
      setImgStatus('⚠ Não consegui publicar. Abre a app pelo <b>Relationship.bat</b> (o ajudante tem de estar a correr).<br><span style="color:#888">'+escText(e.message)+'</span>',statusId);
    }
  });
}
function embedImageInto(setUrl, statusId){
  pickFile((file)=>{
    if(file.size>1.2*1024*1024){ setImgStatus("⚠ Para base64 usa imagens pequenas (<1MB) — o HTML fica enorme.",statusId); }
    const r=new FileReader();
    r.onload=()=>{ setUrl(r.result); dirty(); renderAll(); toast("Imagem embebida (base64)"); };
    r.readAsDataURL(file);
  });
}
function publishImage(p){ publishImageInto(u=>{p.src=u;}); }
function embedImage(p){ embedImageInto(u=>{p.src=u;}); }

/* ============================ RENDER: TAGS ============================ */
function renderTags(filter){
  const box=$("tabTags");
  filter=(filter||"").toLowerCase();
  /* As tags do template são as da sua FONTE DE DADOS — nunca as de outra fonte misturadas.
     Reservas e Faturas usam ambas @Model[0], mas os campos são DIFERENTES (ex.: OnlineCheckIn vs OnlineCheckin). */
  const t0=cur(), src=tsource(t0), S=SOURCES[src]||SOURCES.RelationShipEmail, K=kinfo(t0);
  const mine=tagsFor(t0);
  const showAll=!!state.tagAll;
  let h=`<div class="tag-hint" style="border-style:solid;border-color:#cfe0ff;background:var(--chip)">
    <b>${escText(K.label)}</b> · fonte de dados <b>${escText(src)}</b> — ${mine.length} tags no formato <b>${S.fmt==="token"?"@TAGNAME@":"@Model[0].Campo"}</b>.<br>${escText(K.where)}</div>`;
  h+=`<input class="tagsearch" id="tagSearch" placeholder="🔎 Procurar tag…" value="${esc(filter)}">`;
  h+='<div class="ready off" id="tagReady"></div>';
  const cats={};
  tags.filter(t=> (showAll||t.src===src) &&
                  (!filter || (t.label.toLowerCase().includes(filter)||t.code.toLowerCase().includes(filter)||t.cat.toLowerCase().includes(filter))))
      .forEach(t=>{ (cats[t.cat]=cats[t.cat]||[]).push(t); });
  const keys=Object.keys(cats);
  if(!keys.length) h+='<div class="tag-hint">Sem resultados.</div>';
  for(const c of keys){
    h+=`<div class="tagcat">${escText(c)}</div>`;
    cats[c].forEach(t=>{
      const foreign=t.src!==src;
      h+=`<div class="tag" data-code="${escAttr(t.code)}"${foreign?' title="Atenção: esta tag é de outra fonte de dados ('+escAttr((SOURCES[t.src]||{}).label||t.src)+') e não vai ser substituída neste template" style="opacity:.55"':''}><div><div class="tlab">${escText(t.label)}${foreign?' ⚠':''}</div><div class="tcode">${escText(t.code)}</div></div><div class="ins">inserir ＋</div></div>`;
    });
  }
  h+=`<div style="margin-top:14px;display:flex;gap:6px"><button class="btn sm" id="btnAddTag" style="flex:1">+ Adicionar tag</button><button class="btn sm" id="btnResetTags">↺ Repor</button></div>`;
  h+=`<label class="hint" style="display:flex;align-items:center;gap:6px;margin-top:10px;cursor:pointer"><input type="checkbox" id="tagAll" ${showAll?"checked":""} style="accent-color:var(--accent)"> Mostrar também tags de outras fontes de dados (não recomendado)</label>`;
  box.innerHTML=h;
  const ta=box.querySelector("#tagAll"); if(ta) ta.addEventListener("change",()=>{ state.tagAll=ta.checked; renderTags($("tagSearch").value); });
  $("tagSearch").addEventListener("input",e=>renderTags(e.target.value));
  box.querySelectorAll(".tag").forEach(el=>{
    el.addEventListener("mousedown",e=>{ e.preventDefault(); insertTag(el.getAttribute("data-code")); });
  });
  updateTagReady();
  $("btnAddTag").addEventListener("click",addTagDialog);
  $("btnResetTags").addEventListener("click",()=>{ if(confirm("Repor a lista de tags por defeito?")){ tags=defaultTagSet(); saveTags(); renderTags(); } });
}

function updateTagReady(){
  const el=document.getElementById("tagReady"); if(!el) return;
  const ok=state.activeField && document.body.contains(state.activeField);
  el.className="ready "+(ok?"on":"off");
  el.innerHTML = ok ? "✓ Pronto — a tag entra no campo ativo" : "○ Clica primeiro num campo (assunto, dados ou corpo), depois numa tag";
}
function insertTag(code){
  const el=state.activeField;
  if(!el || !document.body.contains(el)){ toast("Clica primeiro num campo de texto"); return; }
  const s=el.selectionStart??el.value.length, e=el.selectionEnd??el.value.length;
  el.value = el.value.slice(0,s)+code+el.value.slice(e);
  const pos=s+code.length; el.focus(); el.setSelectionRange(pos,pos);
  el.dispatchEvent(new Event("input"));
  state.activeField=el;
}

function addTagDialog(){
  const label=prompt("Nome amigável da tag (ex.: Data check-in):"); if(!label) return;
  const code=prompt("Código exato do PMS (ex.: @Model[0].CheckInDate):"); if(!code) return;
  const cat=prompt("Categoria (Hóspede, Reserva, Empresa, Agência, CRO, Outros):","Reserva")||"Outros";
  const sample=prompt("Valor de exemplo para o preview:","")||"";
  tags.push({cat,label,code,sample}); saveTags(); renderTags(); toast("Tag adicionada");
}

function toEntities(html){ return (html||"").replace(/[\u0080-\uFFFF]/g, c=>"&#"+c.charCodeAt(0)+";"); }
function openExport(){
  const lang=state.lang;
  const html=toEntities(buildEmail(lang,false,true));
  const subject=curLang().subject;
  const t=cur(), K=kinfo(t), isPms=tkind(t)==="pms";
  /* Nos modelos do PMS há mais campos a preencher além do assunto+HTML — damos a ficha toda. */
  let fichaI="";
  if(isPms){
    const pd=pmsData(t);
    const row=(lbl,val,id)=>`<tr><td style="padding:5px 10px 5px 0;color:var(--muted);white-space:nowrap">${escText(lbl)}</td>
      <td style="padding:5px 0"><input type="text" id="${id}" value="${escAttr(val||"")}" readonly style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 9px;border-radius:8px;font-size:12.5px"></td>
      <td style="padding:5px 0 5px 6px"><button class="btn sm" onclick="window.__copy('${id}',true)" title="Copiar">⧉</button></td></tr>`;
    fichaI=`<div class="field"><label>1 · Cabeçalho do modelo (preenche uma vez, serve para todos os idiomas)</label>
      <table style="width:100%;border-collapse:collapse">
        ${PMS_FIELDS.map(([k,lbl])=>row(lbl,pd[k],"pf_"+k)).join("")}
        <tr><td style="padding:5px 10px 5px 0;color:var(--muted)">Fonte de dados</td><td colspan="2" style="padding:5px 0"><b>${escText(tsource(t))}</b></td></tr>
        <tr><td style="padding:5px 10px 5px 0;color:var(--muted)">Opções</td><td colspan="2" style="padding:5px 0">${pd.active?"✓ Ativo":"○ Inativo"} · ${pd.sms?"✓ SMS":"○ Sem SMS"} · ${pd.sub?"✓ Sub-Modelo":"○ Não é sub-modelo"}</td></tr>
      </table></div>`;
  }
  const n=isPms?2:1;
  showModal(`Copiar para o PMS — ${escText(t.name)} · ${lang.toUpperCase()}`,
    `<div class="tag-hint" style="margin-bottom:10px"><b>${escText(K.label)}</b> — ${escText(K.where)}.<br>
       Cola o <b>Assunto</b> e o <b>HTML</b> no separador do idioma <b>${lang.toUpperCase()}</b>. Os acentos vão como entidades HTML (&amp;#231; …) — é normal e garante compatibilidade máxima no envio.</div>
     ${fichaI}
     <div class="switchmode">
       ${LANGS.map(l=>`<button class="btn sm ${lang===l.code?'primary':''}" onclick="window.__expLang('${l.code}')">${l.label}</button>`).join("")}
     </div>
     <div class="field"><label>${n} · Assunto (campo "Assunto" do PMS)</label>
       <input type="text" id="expSubject" value="${escAttr(subject)}" style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:9px"></div>
     <label style="font-size:11px;color:var(--muted)">${n+1} · HTML (campo "Texto" do PMS${isPms?' — botão «&lt;&gt;» Código fonte':''})</label>
     <pre class="code" id="expCode">${esc(html)}</pre>`,
    `<button class="btn" onclick="window.__copy('expSubject',true)">Copiar assunto</button>
     <button class="btn primary" onclick="window.__copy('expCode')">⧉ Copiar HTML</button>
     <button class="btn ghost" onclick="window.__closeModal()">Fechar</button>`);
}
window.__expLang=l=>{ state.lang=l; setLangUI(); openExport(); };
window.__copy=(id,isInput)=>{
  const el=$(id); const txt=isInput?el.value:el.textContent;
  navigator.clipboard.writeText(txt).then(()=>toast("Copiado!"),()=>{
    const r=document.createRange(); r.selectNode(el); getSelection().removeAllRanges(); getSelection().addRange(r);
    try{document.execCommand("copy");toast("Copiado!");}catch(e){toast("Copia manualmente (Ctrl+C)");}
  });
};
window.__closeModal=closeModal;

function openPreview(){
  const lang=state.lang;
  const html=applySample(buildEmail(lang));
  showModal(`Pré-visualização — ${lang.toUpperCase()} (com dados de exemplo)`,
    `<div class="switchmode">
       ${LANGS.map(l=>`<button class="btn sm ${lang===l.code?'primary':''}" onclick="window.__prevLang('${l.code}')">${l.label}</button>`).join("")}
       <span style="flex:1"></span>
       <span style="font-size:11px;color:var(--muted);align-self:center">Os valores a amarelo são exemplos das tags</span>
     </div>
     <div style="background:#e9edf3;border-radius:10px;padding:10px"><iframe id="prevFrame" style="width:100%;height:52vh;border:0;background:#fff;border-radius:6px"></iframe></div>`,
    `<button class="btn ghost" onclick="window.__closeModal()">Fechar</button>`);
  const f=document.getElementById("prevFrame");
  const doc=f.contentDocument||f.contentWindow.document;
  doc.open(); doc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="margin:0;padding:0">'+html+'</body></html>'); doc.close();
}
window.__prevLang=l=>{ state.lang=l; setLangUI(); openPreview(); };

/* Ordem de calendário + mês de cada tema (para a galeria ficar arrumada e lógica) */
const SEA_META={ carnaval:[1,"fev"], valentim:[2,"fev"], diapai:[3,"mar"], pascoa:[4,"mar–abr"], diamae:[5,"mai"], diacrianca:[6,"jun"], santos:[7,"jun"], verao:[8,"jun–set"], vindimas:[9,"set"], oktoberfest:[10,"out"], halloween:[11,"out"], outono:[12,"out–nov"], smartinho:[13,"nov"], blackfriday:[14,"nov"], natal:[15,"dez"], reveillon:[16,"dez"], inverno:[17,"dez–fev"], spa:[18,"sempre"], vinho:[19,"sempre"], aniversario:[20,"sempre"] };
function instSeasonal(s){
  const clone=o=>JSON.parse(JSON.stringify(o));
  const t={ id:"tpl"+(_ctr++)+"_"+Math.floor(performance.now()), name:s.name, mode:"house",
    design:s.design, font:s.font, palette:s.palette, shade:s.shade,
    brand:{ logo:"", hero:s.hero }, settings:{ width:0 } };
  LANG_CODES.forEach(lc=>{ const c=s[lc]||s.pt; t[lc]={ subject:c.subject, data:clone(c.data||[]), body:clone(c.body||[]) }; });
  proj().templates.push(t); state.currentTemplateId=t.id; state.selectedBlock=null; state.lang="pt";
  save(); closeModal(); renderAll(); toast("«"+s.name+"» criado em "+proj().hotel+" — troca a imagem de topo pela do teu hotel.");
}
let galSel=0; let galExtra={};
function galVars(ei){ return GAL_VARIANTS.concat(galExtra[ei]||[]); }
function openGallery(){
  galSel=0; galExtra={};
  showModal("Galeria de modelos — inspiração pronta a usar",
    `<div class="tag-hint">Modelos <b>já feitos</b> para te inspirares: escolhe o <b>evento</b> (em cima) e explora estilos de hotel — de resort de praia a palácio clássico. Clicar cria um template novo <b>preenchido nos 6 idiomas</b>, pronto a personalizar. Usa «Gerar mais» para veres mais combinações.</div><div id="galWrap"></div>`,
    `<button class="btn ghost" onclick="window.__closeModal()">Fechar</button>`);
  renderGal();
}
function renderGal(){
  const w=$("galWrap"); if(!w) return;
  const chips=STARTERS.map((st,i)=>`<button class="gchip${i===galSel?' on':''}" data-gev="${i}" title="${escAttr(st.code||"")}">${ic("mail",15)}<span>${escText(st.name)}</span></button>`).join("");
  const st=STARTERS[galSel];
  const cards=galVars(galSel).map((v,vi)=>{
    const P=pal(v.palette);
    return `<div class="gvcard" data-gvi="${vi}" title="${escAttr(v.design+" · "+P.name)}">
      <div class="gvthumb">${designThumb(v.design)}</div>
      <div class="gvmeta"><span class="gvname">${escText(v.label)}</span><span class="gvdots"><i style="background:${P.accent}"></i><i style="background:${P.accentDark}"></i></span></div>
    </div>`;
  }).join("");
  const seaSorted=SEASONAL.slice().sort((a,b)=>((SEA_META[a.key]||[99])[0])-((SEA_META[b.key]||[99])[0]));
  const seasonCards=seaSorted.map(s=>{
    const P=pal(s.palette), mo=(SEA_META[s.key]||[0,""])[1];
    return `<button type="button" class="schip" data-gsea="${escAttr(s.key)}" title="${escAttr(s.design+" · "+P.name+" — clica para criar o template")}">
      <span class="schip-ic" style="background:${P.tint}">${s.emoji}</span><span class="schip-nm">${escText(s.name)}</span><span class="schip-mo">${escText(mo)}</span>
    </button>`;
  }).join("");
  w.innerHTML=`<div class="gchips">${chips}</div>
    <div class="gevhead"><span class="gevcode" style="background:${st.accent}">${escText(st.code||"")}</span><span class="gevname">${escText(st.name)}</span><span style="flex:1"></span><button class="btn sm" id="galMore" title="Gerar mais uma variante visual deste evento">${ic("wand",14)} Gerar mais</button></div>
    <div class="gvgrid">${cards}</div>
    <div class="gevhead" style="margin-top:22px"><span class="gevcode" style="background:#d97706">ÉPOCA</span><span class="gevname">Campanhas temáticas</span><span style="flex:1"></span><span class="hint" style="margin:0">Tema, cores e imagem decorativa incluídos — nos 6 idiomas</span></div>
    <div class="schips">${seasonCards}</div>`;
  w.querySelectorAll("[data-gev]").forEach(el=>el.addEventListener("click",()=>{ galSel=+el.dataset.gev; renderGal(); }));
  w.querySelectorAll("[data-gvi]").forEach(el=>el.addEventListener("click",()=>galPick(+el.dataset.gvi)));
  w.querySelectorAll("[data-gsea]").forEach(el=>el.addEventListener("click",()=>{ const s=SEASONAL.find(x=>x.key===el.dataset.gsea); if(s) instSeasonal(s); }));
  const more=$("galMore"); if(more) more.addEventListener("click",galMore);
}
function galPick(vi){
  const st=STARTERS[galSel], v=galVars(galSel)[vi];
  const t=instStarter(st);
  t.design=v.design; t.palette=v.palette; t.font=v.font; t.shade=v.shade;
  proj().templates.push(t); state.currentTemplateId=t.id; state.selectedBlock=null; state.lang="pt";
  save(); closeModal(); renderAll(); toast("Modelo «"+st.name+" · "+v.label+"» criado em "+proj().hotel);
}
function galMore(){
  const shown=galVars(galSel).map(v=>v.design+"/"+v.palette);
  const next=GAL_POOL.find(v=>shown.indexOf(v.design+"/"+v.palette)<0);
  if(!next){ toast("Já tens todas as variantes deste evento."); return; }
  (galExtra[galSel]=galExtra[galSel]||[]).push(next);
  renderGal();
